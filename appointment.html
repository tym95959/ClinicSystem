<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hope Dental | Appointment</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: #eef2f7; min-height: 100vh; }
        .clinic-header {
            background: linear-gradient(90deg, #ffffff 0%, #20b2aa 100%);
            color: #004d4d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo h2 { font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
        .back-btn { background: #1e4a6e; border: none; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .back-btn:hover { background: #c63d2f; }
        .admin-container { max-width: 1400px; margin: 28px auto; padding: 0 24px; }
        .card { background: white; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 28px 32px; margin-bottom: 28px; border: 1px solid #e2eaf0; }
        .card-title { font-size: 1.3rem; font-weight: 600; color: #0a2f44; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; border-left: 5px solid #0f5c7a; padding-left: 18px; flex-wrap: wrap; justify-content: space-between; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-weight: 600; font-size: 12px; color: #1f5e7e; }
        .input-group input, .input-group select, .input-group textarea { padding: 10px 14px; border: 1.5px solid #e2eaf0; border-radius: 16px; font-size: 13px; transition: 0.2s; background: white; }
        .search-section { background: #f8fbfe; border-radius: 20px; padding: 20px; margin-bottom: 8px; }
        .availability-card { background: #e6f4ea; padding: 16px 20px; border-radius: 20px; margin-top: 20px; }
        .time-slot-custom { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .time-slot-custom .input-group { flex: 1; min-width: 120px; }
        .existing-appointments-list { margin-top: 12px; background: #fef9e3; padding: 10px; border-radius: 16px; font-size: 12px; max-height: 150px; overflow-y: auto; }
        .existing-appointments-list strong { color: #b91c1c; }
        .btn-primary { background: #0f5c7a; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-primary:hover { background: #08455c; }
        .btn-sm { background: #e2eaf0; border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-size: 11px; margin: 0 4px; transition: 0.2s; }
        .btn-danger-sm { background: #ffe9e9; color: #b91c1c; border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-size: 11px; margin: 0 4px; transition: 0.2s; }
        .appointments-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .appointments-table th, .appointments-table td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e9edf2; vertical-align: middle; font-size: 13px; }
        .appointments-table th { background: #f4f9fe; font-weight: 600; color: #1f4d6e; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: 500; }
        .status-scheduled { background: #e0f2fe; color: #075985; }
        .status-cancelled { background: #ffe9e9; color: #b91c1c; }
        .status-completed { background: #e6e9f0; color: #475569; }
        .message { margin-top: 16px; padding: 12px; border-radius: 28px; text-align: center; font-size: 12px; }
        .success { background: #e0f7ef; color: #146b3a; }
        .error { background: #ffe9e9; color: #b91c1c; }
        .info { background: #e0f2fe; color: #075985; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 28px; padding: 28px 32px; max-width: 450px; width: 90%; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
        .btn-danger { background: #dc3545; color: white; border: none; padding: 10px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e2f3a; color: white; padding: 12px 24px; border-radius: 60px; font-size: 0.85rem; z-index: 1200; transition: 0.2s; pointer-events: none; white-space: nowrap; }
        @media (max-width:600px){ .toast-msg { white-space: normal; max-width: 90%; } }
        .add-new-btn { background: none; border: none; color: #0f5c7a; cursor: pointer; font-size: 12px; margin-top: 8px; font-weight: 500; text-decoration: underline; }
        .patient-search-result { padding: 10px 12px; border-bottom: 1px solid #e2eaf0; cursor: pointer; transition: 0.1s; }
        .patient-search-result:hover { background: #e0f2fe; border-radius: 12px; }
        .id-badge { 
            background: #0f5c7a; 
            color: white; 
            padding: 2px 10px; 
            border-radius: 12px; 
            font-size: 10px; 
            font-weight: 600;
            display: inline-block;
            margin-left: 5px;
        }
    </style>
</head>
<body>
<div class="clinic-header">
    <div style="display: flex; align-items: center; gap: 12px;">
        <img src="hope1.png" alt="Hope Dental Logo" style="height: 50px; vertical-align: middle;">
        <h1 style="font-size: 1.3rem; font-weight: 600; margin: 0; background: linear-gradient(135deg, #006666, #20b2aa); -webkit-background-clip: text; background-clip: text; color: transparent;">Hope Dental CLINIC</h1>
    </div>
    <div>
        <button class="back-btn" onclick="window.location.href='clinicdash.html'">← Dashboard</button>
    </div>
</div>

<div class="admin-container">
    <!-- Book Appointment Card -->
    <div class="card">
        <div class="card-title">📝 Book New Appointment</div>
        <div class="form-row">
            <div class="input-group">
                <label>👨‍⚕️ Select Doctor</label>
                <select id="doctorSelect"><option value="">-- Loading doctors --</option></select>
                <button type="button" class="add-new-btn" id="refreshDoctorsBtn">⟳ Refresh Doctors</button>
            </div>
            <div class="input-group">
                <label>📅 Appointment Date</label>
                <input type="date" id="appointmentDate" min="">
            </div>
        </div>

        <!-- Custom Time + Duration Section -->
        <div id="timeSlotsContainer" style="display: none;">
            <div class="availability-card">
                <strong>⏰ Duty Hours for <span id="selectedDoctorName"></span> on <span id="selectedDateDisplay"></span></strong>
                <div id="dutyInfoMessage" style="font-size: 12px; margin-top: 8px; color: #2c6e2c;"></div>
                <div class="time-slot-custom" style="margin-top: 15px;">
                    <div class="input-group">
                        <label>🕒 Start Time</label>
                        <input type="time" id="customStartTime" step="60">
                    </div>
                    <div class="input-group">
                        <label>⏱️ Duration (minutes)</label>
                        <input type="number" id="customDuration" min="1" value="30" step="1" style="width: 120px;">
                    </div>
                    <div class="input-group">
                        <label>&nbsp;</label>
                        <button type="button" class="btn-primary" id="checkAvailabilityBtn" style="padding: 10px 20px;">✓ Check & Book</button>
                    </div>
                </div>
                <div id="availabilityResult" class="info" style="margin-top: 12px; display: none;"></div>
                <div id="existingAppointmentsList" class="existing-appointments-list" style="display: none;"></div>
            </div>
        </div>

        <!-- Patient Selection: Search + Auto-fill -->
        <div class="search-section">
            <div class="input-group">
                <label>🔍 Search Existing Patient (Name, ID/Passport, or Contact)</label>
                <input type="text" id="patientSearch" placeholder="Type name, ID/Passport number, or phone...">
                <div id="patientSearchResults"></div>
                <button type="button" class="add-new-btn" id="addPatientBtn">+ Add New Patient (Modal)</button>
                <div class="info" style="font-size: 11px; margin-top: 8px; color: #5f7f9a;">💡 Select a patient from search results → fields auto‑fill. Or type manually.</div>
            </div>
        </div>

        <!-- Editable Patient Fields -->
        <div class="form-row">
            <div class="input-group"><label>👤 Patient Name *</label><input type="text" id="patientName" placeholder="Enter full name"></div>
            <div class="input-group"><label>🪪 ID / Passport *</label><input type="text" id="patientId" placeholder="e.g., A123456 or passport number"></div>
            <div class="input-group"><label>📞 Contact Number *</label><input type="text" id="contactNo" placeholder="Phone number"></div>
        </div>

        <!-- Service Selection -->
        <div class="form-row">
            <div class="input-group">
                <label>💊 Service (Optional)</label>
                <select id="serviceSelect"><option value="">-- Select Service --</option></select>
                <button type="button" class="add-new-btn" id="addServiceBtn">+ Add New Service</button>
            </div>
            <div class="input-group">
                <label>📝 Notes</label>
                <input type="text" id="appointmentNotes" placeholder="Reason for visit">
            </div>
        </div>

        <div id="bookingMessage" class="message"></div>
    </div>

    <!-- Appointments List -->
    <div class="card">
        <div class="card-title">📋 Appointments <button class="btn-sm" id="refreshAppointmentsBtn">⟳ Refresh</button></div>
        <div style="overflow-x:auto;">
            <table class="appointments-table">
                <thead><tr><th>Date</th><th>Time</th><th>Duration</th><th>Doctor</th><th>Patient</th><th>Service</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="appointmentsList"></tbody>
            </table>
        </div>
        <div id="noAppointmentsMsg" style="text-align:center; padding:20px; color:#8ba0b0; display:none;">No appointments scheduled</div>
    </div>
</div>

<!-- Modals for Add Patient & Add Service -->
<div id="patientModal" class="modal">
    <div class="modal-content">
        <h3>Add New Patient</h3>
        <div class="input-group"><label>Full Name *</label><input type="text" id="newPatientName"></div>
        <div class="input-group"><label>ID / Passport *</label><input type="text" id="newPatientId" placeholder="ID or Passport number"></div>
        <div class="input-group"><label>Phone Number *</label><input type="text" id="newPatientPhone"></div>
        <div class="modal-buttons"><button class="btn-primary" id="savePatientBtn">Save</button><button class="btn-danger" id="cancelPatientBtn">Cancel</button></div>
    </div>
</div>
<div id="serviceModal" class="modal">
    <div class="modal-content">
        <h3>Add New Service</h3>
        <div class="input-group"><label>Service Name *</label><input type="text" id="newServiceName"></div>
        <div class="input-group"><label>Price (MVR)</label><input type="number" id="newServicePrice"></div>
        <div class="modal-buttons"><button class="btn-primary" id="saveServiceBtn">Save</button><button class="btn-danger" id="cancelServiceBtn">Cancel</button></div>
    </div>
</div>

<div id="toastMsg" class="toast-msg" style="opacity:0; visibility:hidden;"></div>

<script>
    (function() {
        // ========== AUTH ==========
        const loggedInUser = localStorage.getItem('loggedInUser');
        if (!loggedInUser) { window.location.href = 'login.html'; return; }
        let currentUser;
        try { currentUser = JSON.parse(loggedInUser); } catch(e) { window.location.href = 'login.html'; return; }

        // ========== GLOBALS ==========
        let doctorsList = [];
        let patientsList = [];
        let servicesList = [];
        let appointments = [];
        let dutyAllocations = [];
        let currentDoctorId = null;
        let currentDate = null;

        function showToast(msg, isError=false) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.style.backgroundColor = isError ? '#b91c1c' : '#0f5c7a';
            toast.style.opacity = '1'; toast.style.visibility = 'visible';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.visibility = 'hidden'; }, 2500);
        }
        function showMessage(msg, type) {
            const div = document.getElementById('bookingMessage');
            div.innerText = msg; div.className = `message ${type}`;
            setTimeout(() => { div.innerText = ''; div.className = 'message'; }, 4000);
        }

        // ========== HELPER: Get Patient ID/Passport Value ==========
        function getPatientDisplayId(patient) {
            if (!patient) return 'N/A';
            // Check each field in priority order
            if (patient.idNumber && patient.idNumber.trim() !== '') {
                return patient.idNumber;
            }
            if (patient.passportNumber && patient.passportNumber.trim() !== '') {
                return patient.passportNumber;
            }
            if (patient.nationalId && patient.nationalId.trim() !== '') {
                return patient.nationalId;
            }
            if (patient.id && patient.id.trim() !== '') {
                return patient.id;
            }
            return 'N/A';
        }

        // ========== LOAD DOCTORS ==========
        async function loadDoctors() {
            if (!window.db) return;
            try {
                const snap = await window.db.collection("doctors").get();
                doctorsList = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const select = document.getElementById('doctorSelect');
                select.innerHTML = '<option value="">-- Select Doctor --</option>';
                
                if (doctorsList.length === 0) {
                    const userSnap = await window.db.collection("users").where("Level", "==", "Doctor").get();
                    doctorsList = userSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                }
                
                doctorsList.forEach(d => {
                    const displayName = d.name || d.username || d.displayName || 'Unknown';
                    const speciality = d.speciality || d.Speciality || 'General';
                    select.innerHTML += `<option value="${d.id}">${displayName} (${speciality})</option>`;
                });
                
                if (doctorsList.length === 0) {
                    select.innerHTML += '<option disabled>⚠️ No doctors found</option>';
                    showToast("No doctors found. Please add doctors first.", true);
                } else {
                    console.log(`✅ Loaded ${doctorsList.length} doctors`);
                }
            } catch(e) { 
                console.error(e); 
                showToast("Failed to load doctors", true);
                document.getElementById('doctorSelect').innerHTML = '<option value="">⚠️ Error loading doctors</option>';
            }
        }

        async function loadDutyAllocations() {
            if (!window.db) return;
            try {
                const snap = await window.db.collection("dutyAllocations").get();
                dutyAllocations = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch(e) { console.warn(e); dutyAllocations = []; }
        }

        async function loadPatients() {
            if (!window.db) return;
            const snap = await window.db.collection("patients").get();
            patientsList = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            console.log(`✅ Loaded ${patientsList.length} patients`);
        }
        async function loadServices() {
            if (!window.db) return;
            const snap = await window.db.collection("services").get();
            servicesList = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const serviceSelect = document.getElementById('serviceSelect');
            serviceSelect.innerHTML = '<option value="">-- Select Service --</option>';
            servicesList.forEach(s => serviceSelect.innerHTML += `<option value="${s.id}">${s.name} - MVR ${s.price}</option>`);
        }
        async function loadAppointments() {
            if (!window.db) return;
            try {
                const snap = await window.db.collection("appointments").orderBy("date", "desc").get();
                appointments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAppointments();
                if (currentDoctorId && currentDate) displayExistingAppointments();
            } catch(e) {
                const snap = await window.db.collection("appointments").get();
                appointments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                appointments.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
                renderAppointments();
                if (currentDoctorId && currentDate) displayExistingAppointments();
            }
        }

        // ========== DUTY & TIME VALIDATION ==========
        function getDutyForDoctor(doctorId, date) {
            return dutyAllocations.find(d => d.doctorId === doctorId && d.date === date);
        }

        function timeToMinutes(timeStr) {
            if (!timeStr) return null;
            let [hour, minute] = timeStr.split(':');
            return parseInt(hour) * 60 + parseInt(minute);
        }

        function minutesToTime(minutes) {
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        }

        function formatTimeForDisplay(timeStr) {
            if (!timeStr) return '';
            let [hour, minute] = timeStr.split(':');
            let h = parseInt(hour);
            let ampm = h >= 12 ? 'PM' : 'AM';
            let h12 = h % 12 || 12;
            return `${h12}:${minute} ${ampm}`;
        }

        async function isTimeSlotAvailable(doctorId, date, startTime, durationMinutes) {
            const startMinutes = timeToMinutes(startTime);
            const endMinutes = startMinutes + durationMinutes;
            const duty = getDutyForDoctor(doctorId, date);
            if (!duty) return false;
            const dutyStart = timeToMinutes(duty.startTime);
            const dutyEnd = timeToMinutes(duty.endTime);
            if (startMinutes < dutyStart || endMinutes > dutyEnd) return false;
            for (let apt of appointments) {
                if (apt.doctorId === doctorId && apt.date === date && apt.status !== 'Cancelled' && apt.startTime && apt.durationMinutes) {
                    const aptStart = timeToMinutes(apt.startTime);
                    const aptEnd = aptStart + apt.durationMinutes;
                    if ((startMinutes < aptEnd && endMinutes > aptStart)) return false;
                } else if (apt.doctorId === doctorId && apt.date === date && apt.status !== 'Cancelled' && apt.time) {
                    const legacyStart = timeToMinutes(apt.time);
                    const legacyEnd = legacyStart + 30;
                    if ((startMinutes < legacyEnd && endMinutes > legacyStart)) return false;
                }
            }
            return true;
        }

        async function displayDoctorDutyAndExisting() {
            const doctorId = document.getElementById('doctorSelect').value;
            const date = document.getElementById('appointmentDate').value;
            if (!doctorId || !date) {
                document.getElementById('timeSlotsContainer').style.display = 'none';
                return;
            }
            currentDoctorId = doctorId;
            currentDate = date;
            const doctor = doctorsList.find(d => d.id === doctorId);
            if (!doctor) return;
            document.getElementById('selectedDoctorName').innerText = doctor.name || doctor.username || 'Doctor';
            document.getElementById('selectedDateDisplay').innerText = date;

            const duty = getDutyForDoctor(doctorId, date);
            const dutyMsgSpan = document.getElementById('dutyInfoMessage');
            if (!duty) {
                dutyMsgSpan.innerHTML = '<span style="color:#b91c1c;">❌ No duty assigned for this doctor on this date. Please contact supervisor.</span>';
                document.getElementById('timeSlotsContainer').style.display = 'block';
                document.getElementById('existingAppointmentsList').style.display = 'none';
                return;
            }
            dutyMsgSpan.innerHTML = `🕒 Duty hours: ${formatTimeForDisplay(duty.startTime)} - ${formatTimeForDisplay(duty.endTime)}`;
            document.getElementById('timeSlotsContainer').style.display = 'block';
            displayExistingAppointments();
        }

        async function displayExistingAppointments() {
            const doctorId = currentDoctorId;
            const date = currentDate;
            if (!doctorId || !date) return;
            const existing = appointments.filter(apt => apt.doctorId === doctorId && apt.date === date && apt.status !== 'Cancelled');
            const container = document.getElementById('existingAppointmentsList');
            if (existing.length === 0) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'block';
            let html = `<strong>📌 Existing appointments on this day:</strong><ul style="margin: 6px 0 0 18px;">`;
            existing.forEach(apt => {
                let timeDisplay = apt.startTime ? `${formatTimeForDisplay(apt.startTime)} (${apt.durationMinutes} min)` : apt.time;
                // Get the actual ID/Passport from the patient record
                const patient = patientsList.find(p => p.id === apt.patientId || p.idNumber === apt.patientId || p.passportNumber === apt.patientId);
                const displayId = patient ? getPatientDisplayId(patient) : apt.patientId || 'N/A';
                html += `<li><strong>${apt.time || apt.startTime}</strong> – ${apt.patientName} (🪪 ${displayId})</li>`;
            });
            html += `</ul>`;
            container.innerHTML = html;
        }

        async function checkAvailabilityAndBook() {
            const doctorId = document.getElementById('doctorSelect').value;
            const date = document.getElementById('appointmentDate').value;
            const startTime = document.getElementById('customStartTime').value;
            const duration = parseInt(document.getElementById('customDuration').value);
            const patientId = document.getElementById('patientId').value.trim();
            const patientName = document.getElementById('patientName').value.trim();
            const contact = document.getElementById('contactNo').value.trim();
            const serviceId = document.getElementById('serviceSelect').value;
            const notes = document.getElementById('appointmentNotes').value.trim();

            const resultDiv = document.getElementById('availabilityResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'info';

            if (!doctorId || !date || !startTime || !duration) {
                resultDiv.innerHTML = '⚠️ Please select doctor, date, start time, and duration.';
                return;
            }
            if (duration < 1) {
                resultDiv.innerHTML = '⚠️ Duration must be at least 1 minute.';
                return;
            }
            if (!patientId || !patientName || !contact) {
                resultDiv.innerHTML = '⚠️ Please provide Patient Name, ID/Passport, and Contact Number.';
                return;
            }

            const duty = getDutyForDoctor(doctorId, date);
            if (!duty) {
                resultDiv.innerHTML = '❌ No duty assigned for this doctor on this date.';
                return;
            }
            const dutyStart = timeToMinutes(duty.startTime);
            const dutyEnd = timeToMinutes(duty.endTime);
            const startMinutes = timeToMinutes(startTime);
            const endMinutes = startMinutes + duration;
            if (startMinutes < dutyStart || endMinutes > dutyEnd) {
                resultDiv.innerHTML = `❌ Appointment time (${formatTimeForDisplay(startTime)} for ${duration} min) is outside duty hours (${formatTimeForDisplay(duty.startTime)} - ${formatTimeForDisplay(duty.endTime)}).`;
                return;
            }
            const available = await isTimeSlotAvailable(doctorId, date, startTime, duration);
            if (!available) {
                resultDiv.innerHTML = '❌ This time slot conflicts with an existing appointment. Please choose another start time or adjust duration.';
                return;
            }

            const doctor = doctorsList.find(d => d.id === doctorId);
            const service = servicesList.find(s => s.id === serviceId);
            try {
                // Find the patient to get their ID/Passport value
                const patient = patientsList.find(p => p.id === patientId || p.idNumber === patientId || p.passportNumber === patientId);
                const displayId = patient ? getPatientDisplayId(patient) : patientId;
                
                await window.db.collection("appointments").add({
                    doctorId, doctorName: doctor.name || doctor.username || 'Doctor', doctorSpeciality: doctor.speciality || '',
                    date, startTime, durationMinutes: duration,
                    time: formatTimeForDisplay(startTime),
                    patientId: displayId, // Store the ID/Passport value
                    patientName, contact: contact,
                    serviceId: serviceId || null, serviceName: service?.name || null,
                    status: 'Scheduled', notes, createdBy: currentUser.username,
                    createdAt: new Date().toISOString()
                });
                await loadAppointments();
                document.getElementById('customStartTime').value = '';
                document.getElementById('customDuration').value = '30';
                document.getElementById('patientName').value = '';
                document.getElementById('patientId').value = '';
                document.getElementById('contactNo').value = '';
                document.getElementById('patientSearch').value = '';
                document.getElementById('appointmentNotes').value = '';
                document.getElementById('serviceSelect').value = '';
                resultDiv.innerHTML = `✅ Appointment booked for ${patientName} at ${formatTimeForDisplay(startTime)} for ${duration} minutes.`;
                resultDiv.className = 'success';
                setTimeout(() => { resultDiv.style.display = 'none'; }, 3000);
                displayExistingAppointments();
                showMessage(`✅ Appointment booked successfully`, "success");
            } catch(e) {
                resultDiv.innerHTML = 'Error: ' + e.message;
                resultDiv.className = 'error';
            }
        }

        // ========== CANCEL & DELETE APPOINTMENTS ==========
        window.cancelAppointment = async function(id) {
            const apt = appointments.find(a => a.id === id);
            if (!apt) return;
            if (confirm(`Cancel appointment for ${apt.patientName} on ${apt.date}?`)) {
                try {
                    await window.db.collection("appointments").doc(id).update({ status: 'Cancelled' });
                    await loadAppointments();
                    showMessage(`Appointment cancelled`, "success");
                    if (currentDoctorId && currentDate && apt.doctorId === currentDoctorId && apt.date === currentDate) {
                        displayExistingAppointments();
                    }
                } catch(e) { showMessage("Error cancelling: " + e.message, "error"); }
            }
        };

        window.deleteAppointment = async function(id) {
            const apt = appointments.find(a => a.id === id);
            if (!apt) return;
            if (confirm(`⚠️ PERMANENT DELETE!\n\nDelete appointment for ${apt.patientName} on ${apt.date}? This cannot be undone.`)) {
                try {
                    await window.db.collection("appointments").doc(id).delete();
                    await loadAppointments();
                    showMessage(`Appointment deleted permanently`, "info");
                    if (currentDoctorId && currentDate && apt.doctorId === currentDoctorId && apt.date === currentDate) {
                        displayExistingAppointments();
                    }
                } catch(e) { showMessage("Error deleting: " + e.message, "error"); }
            }
        };

        function renderAppointments() {
            const tbody = document.getElementById('appointmentsList');
            const noMsg = document.getElementById('noAppointmentsMsg');
            if (appointments.length === 0) { tbody.innerHTML = ''; noMsg.style.display = 'block'; return; }
            noMsg.style.display = 'none';
            tbody.innerHTML = appointments.map(apt => {
                let statusClass = '';
                if (apt.status === 'Scheduled') statusClass = 'status-scheduled';
                else if (apt.status === 'Cancelled') statusClass = 'status-cancelled';
                else statusClass = 'status-completed';
                const timeDisplay = apt.startTime ? `${formatTimeForDisplay(apt.startTime)} (${apt.durationMinutes} min)` : apt.time;
                const isCancelled = apt.status === 'Cancelled';
                
                // Get the actual ID/Passport from the patient record
                const patient = patientsList.find(p => p.id === apt.patientId || p.idNumber === apt.patientId || p.passportNumber === apt.patientId);
                const displayPatientId = patient ? getPatientDisplayId(patient) : apt.patientId || 'N/A';
                
                return `<tr>
                    <td>${apt.date}</td>
                    <td><strong>${timeDisplay}</strong></td>
                    <td>${apt.durationMinutes ? apt.durationMinutes+' min' : '30 min'}</td>
                    <td>${apt.doctorName}<br><small>${apt.doctorSpeciality || ''}</small></td>
                    <td>${apt.patientName}<br><small><span class="id-badge">🪪 ${displayPatientId}</span></small></td>
                    <td>${apt.serviceName || '—'}</td>
                    <td><span class="status-badge ${statusClass}">${apt.status}</span></td>
                    <td class="actions">
                        ${!isCancelled ? `<button class="btn-sm" onclick="cancelAppointment('${apt.id}')">Cancel</button>` : ''}
                        <button class="btn-danger-sm" onclick="deleteAppointment('${apt.id}')">Delete</button>
                      </td>
                </tr>`;
            }).join('');
        }

        // ========== PATIENT SEARCH ==========
        function searchPatients(query) {
            if (!query.trim()) return [];
            const q = query.toLowerCase();
            return patientsList.filter(p => 
                (p.name && p.name.toLowerCase().includes(q)) ||
                (p.idNumber && p.idNumber.toLowerCase().includes(q)) ||
                (p.passportNumber && p.passportNumber.toLowerCase().includes(q)) ||
                (p.nationalId && p.nationalId.toLowerCase().includes(q)) ||
                (p.contactNo && p.contactNo.toLowerCase().includes(q)) ||
                (p.phone && p.phone.toLowerCase().includes(q))
            );
        }
        function displayPatientSearchResults(results) {
            const div = document.getElementById('patientSearchResults');
            if (!results.length) { 
                div.innerHTML = '<div style="padding:8px; color:#8ba0b0;">No matching patients found. You can type manually below.</div>'; 
                return; 
            }
            div.innerHTML = results.map(p => {
                const displayContact = p.contactNo || p.phone || 'N/A';
                const displayId = getPatientDisplayId(p);
                return `<div class="patient-search-result" onclick="selectPatient('${p.id}', '${p.name.replace(/'/g, "\\'")}', '${displayContact}')">
                    <strong>${p.name}</strong> <span class="id-badge">🪪 ${displayId}</span><br>
                    <small>📞 ${displayContact}</small>
                </div>`;
            }).join('');
        }
        window.selectPatient = function(id, name, phone) {
            // Find the patient to get their actual ID/Passport value
            const patient = patientsList.find(p => p.id === id);
            const displayId = patient ? getPatientDisplayId(patient) : id;
            
            document.getElementById('patientId').value = displayId;
            document.getElementById('patientName').value = name;
            document.getElementById('contactNo').value = phone;
            document.getElementById('patientSearch').value = `${name} (🪪 ${displayId})`;
            document.getElementById('patientSearchResults').innerHTML = '';
        };

        // ========== ADD PATIENT ==========
        async function addPatient() {
            const name = document.getElementById('newPatientName').value.trim();
            const idNumber = document.getElementById('newPatientId').value.trim();
            const phone = document.getElementById('newPatientPhone').value.trim();
            if (!name || !idNumber || !phone) { alert("Name, ID/Passport, and phone required"); return; }
            
            const patientData = { 
                id: idNumber, // Use the ID/Passport as the patient ID
                name: name, 
                idNumber: idNumber,
                passportNumber: idNumber,
                nationalId: idNumber,
                contactNo: phone, 
                phone: phone, 
                createdAt: new Date().toISOString() 
            };
            await window.db.collection("patients").add(patientData);
            await loadPatients();
            closeModal('patientModal');
            
            // Auto-select the new patient with their ID/Passport
            document.getElementById('patientId').value = idNumber;
            document.getElementById('patientName').value = name;
            document.getElementById('contactNo').value = phone;
            document.getElementById('patientSearch').value = `${name} (🪪 ${idNumber})`;
            
            showToast("Patient added successfully", false);
        }
        async function addService() {
            const name = document.getElementById('newServiceName').value.trim();
            const price = parseFloat(document.getElementById('newServicePrice').value);
            if (!name || isNaN(price)) { alert("Name and price required"); return; }
            await window.db.collection("services").add({ id: `S${Date.now()}`, name, price, createdAt: new Date().toISOString() });
            await loadServices();
            closeModal('serviceModal');
            showToast("Service added", false);
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // ========== EVENT LISTENERS ==========
        document.getElementById('doctorSelect').addEventListener('change', () => {
            displayDoctorDutyAndExisting();
            document.getElementById('availabilityResult').style.display = 'none';
        });
        document.getElementById('appointmentDate').addEventListener('change', () => {
            displayDoctorDutyAndExisting();
            document.getElementById('availabilityResult').style.display = 'none';
        });
        document.getElementById('patientSearch').addEventListener('input', (e) => displayPatientSearchResults(searchPatients(e.target.value)));
        document.getElementById('checkAvailabilityBtn').onclick = checkAvailabilityAndBook;
        document.getElementById('refreshAppointmentsBtn').onclick = loadAppointments;
        document.getElementById('refreshDoctorsBtn').onclick = async () => { await loadDoctors(); showToast("Doctors refreshed", false); };
        document.getElementById('addPatientBtn').onclick = () => document.getElementById('patientModal').style.display = 'flex';
        document.getElementById('addServiceBtn').onclick = () => document.getElementById('serviceModal').style.display = 'flex';
        document.getElementById('savePatientBtn').onclick = addPatient;
        document.getElementById('saveServiceBtn').onclick = addService;
        document.getElementById('cancelPatientBtn').onclick = () => closeModal('patientModal');
        document.getElementById('cancelServiceBtn').onclick = () => closeModal('serviceModal');
        document.getElementById('appointmentDate').min = new Date().toISOString().split('T')[0];

        // ========== INIT ==========
        async function init() {
            if (!window.db) { setTimeout(init, 500); return; }
            console.log("Firebase connected, loading data...");
            await loadDoctors();
            await loadDutyAllocations();
            await loadPatients();
            await loadServices();
            await loadAppointments();
            console.log(`✅ Loaded ${doctorsList.length} doctors, ${patientsList.length} patients, ${servicesList.length} services`);
        }
        init();
    })();
</script>
</body>
</html>
