<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hope Dental | Daily Reports</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase Config (external, ensures window.db) -->
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #eef2f7;
            min-height: 100vh;
        }

        .clinic-header {
            background: #0a2f44;
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo h2 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn, .print-btn {
            background: #1e4a6e;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 11px;
        }

        .print-btn {
            background: #146b3a;
        }

        .container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* Date Filters */
        .date-filter {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            color: #1f5e7e;
        }

        .filter-group input {
            padding: 8px 12px;
            border: 1.5px solid #e2eaf0;
            border-radius: 12px;
            font-size: 12px;
        }

        .filter-btn {
            background: #0f5c7a;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Tables */
        .table-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        th {
            background: #f4f9fe;
            padding: 12px 10px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #1f5e7e;
            border-bottom: 2px solid #e2eaf0;
        }

        td {
            padding: 10px 10px;
            font-size: 11px;
            border-bottom: 1px solid #eef3fa;
            color: #1e2f3e;
            vertical-align: top;
        }

        tr:hover {
            background: #f8fbfe;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8ba0b0;
        }

        /* Stats Cards & Grids */
        .stats-footer {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stats-footer-title {
            font-size: 12px;
            font-weight: 600;
            color: #0a2f44;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2eaf0;
        }

        .stats-grid-small {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .stat-card-small {
            background: #f8fbfe;
            padding: 10px 12px;
            border-radius: 12px;
            text-align: center;
            border-left: 3px solid #0f5c7a;
        }

        .stat-card-small h4 {
            font-size: 10px;
            color: #6c757d;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .stat-value-small {
            font-size: 16px;
            font-weight: 700;
            color: #0a2f44;
        }

        .stat-label-small {
            font-size: 9px;
            color: #8ba0b0;
            margin-top: 3px;
        }

        .insurance-breakdown-grid, .paytype-breakdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .insurance-company-card, .paytype-card {
            background: #f8fbfe;
            border-radius: 12px;
            padding: 10px 12px;
            border-left: 3px solid #0f5c7a;
            text-align: center;
        }
        .insurance-company-name, .paytype-name {
            font-weight: 700;
            font-size: 12px;
            color: #1f5e7e;
            margin-bottom: 5px;
        }
        .insurance-company-total, .paytype-total {
            font-size: 14px;
            font-weight: 700;
            color: #0a2f44;
        }
        .insurance-company-count, .paytype-count {
            font-size: 9px;
            color: #6c757d;
            margin-top: 2px;
        }

        /* Print Styles - A4 */
        @media print {
            @page {
                size: A4;
                margin: 1.2cm;
            }

            body {
                background: white;
                margin: 0;
                padding: 0;
            }

            .clinic-header, .date-filter, .back-btn, .print-btn {
                display: none !important;
            }

            .table-container {
                box-shadow: none;
                border: 1px solid #ccc;
                border-radius: 0;
                margin-bottom: 15px;
                overflow-x: visible;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 8pt;
                min-width: auto;
            }

            th, td {
                border: 1px solid #aaa;
                padding: 5px 6px;
            }

            th {
                background: #e0e7ef;
            }

            .stats-footer {
                display: block !important;
                background: none !important;
                box-shadow: none !important;
                border: 1px solid #ccc !important;
                border-radius: 0 !important;
                padding: 10px !important;
                margin: 15px 0 !important;
            }

            .stats-grid-small, .insurance-breakdown-grid, .paytype-breakdown-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 8px;
            }

            .stat-card-small, .insurance-company-card, .paytype-card {
                background: none !important;
                border: 1px solid #ccc !important;
                border-radius: 0 !important;
                border-left: none !important;
                padding: 6px !important;
            }
        }
    </style>
</head>
<body>
<div class="clinic-header">
    <div class="logo">
        <h2>📊 Hope Dental · Daily Reports</h2>
    </div>
    <div>
        <button class="back-btn" onclick="window.location.href='clinicdash.html'">← Dashboard</button>
        <button class="back-btn" onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="container">
    <div class="date-filter">
        <div class="filter-group">
            <label>From Date</label>
            <input type="date" id="dailyStartDate">
        </div>
        <div class="filter-group">
            <label>To Date</label>
            <input type="date" id="dailyEndDate">
        </div>
        <div class="filter-group">
            <label>&nbsp;</label>
            <button class="filter-btn" onclick="loadDailyReport()">📊 Generate Report</button>
        </div>
        <div class="filter-group">
            <label>&nbsp;</label>
            <button class="print-btn" onclick="printReport()">🖨️ Print Report</button>
        </div>
    </div>

    <div id="dailyReportContent">
        <div class="empty-state">Select a date range and click Generate Report</div>
    </div>
</div>

<script>
    // ========== AUTH & GLOBALS ==========
    const loggedInUser = localStorage.getItem('loggedInUser');
    if (!loggedInUser) window.location.href = 'login.html';
    try {
        const user = JSON.parse(loggedInUser);
        const header = document.querySelector('.clinic-header');
        const userSpan = document.createElement('div');
        userSpan.style.cssText = 'background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 20px; font-size: 11px;';
        userSpan.innerHTML = `👤 ${user.name || user.username} (${user.level})`;
        header.insertBefore(userSpan, header.children[1]);
    } catch(e) {}

    // Set default dates: last 30 days
    const todayDate = new Date();
    const defaultEnd = todayDate.toISOString().split('T')[0];
    const defaultStart = new Date(todayDate.setDate(todayDate.getDate() - 30)).toISOString().split('T')[0];
    document.getElementById('dailyStartDate').value = defaultStart;
    document.getElementById('dailyEndDate').value = defaultEnd;

    // ========== DAILY REPORT (RANGE + REQUIRED FIELDS + INSURANCE BREAKDOWN + PAYMENT BREAKDOWN) ==========
    async function loadDailyReport() {
        const startDateRaw = document.getElementById('dailyStartDate').value;
        const endDateRaw = document.getElementById('dailyEndDate').value;
        if (!startDateRaw || !endDateRaw) {
            alert('Please select both start and end dates');
            return;
        }
        if (!window.db) { setTimeout(() => loadDailyReport(), 400); return; }
        
        try {
            const startDateTime = new Date(startDateRaw);
            startDateTime.setHours(0,0,0,0);
            const endDateTime = new Date(endDateRaw);
            endDateTime.setHours(23,59,59,999);
            
            const snapshot = await window.db.collection("memos")
                .where("createdAt", ">=", startDateTime.toISOString())
                .where("createdAt", "<=", endDateTime.toISOString())
                .get();
            
            const memos = [];
            snapshot.forEach(doc => {
                memos.push({ id: doc.id, ...doc.data() });
            });
            renderDailyReport(memos, startDateRaw, endDateRaw);
        } catch (error) {
            console.error(error);
            document.getElementById('dailyReportContent').innerHTML = `<div class="empty-state">Error: ${error.message}</div>`;
        }
    }

    function renderDailyReport(memos, startDate, endDate) {
        let totalRevenue = 0, totalCollected = 0, totalDiscount = 0;
        // Insurance breakdown by company name
        const insuranceCompanyTotals = {}; // { "CompanyName": { totalAmount: 0, count: 0 } }
        // Payment method breakdown
        const payTypeTotals = {};           // { "Cash": { amount: 0, count: 0 }, "Card": {...}, etc. }
        
        const tableRows = [];
        
        memos.forEach(memo => {
            const billing = memo.billing || {};
            const afterDiscount = billing.afterDiscount || 0;
            const paid = billing.paid || 0;
            const discountAmt = billing.discount?.amount || 0;
            totalRevenue += afterDiscount;
            totalCollected += paid;
            totalDiscount += discountAmt;
            
            // Determine pay type for this memo (only if paid > 0)
            let payType = 'Unknown';
            if (billing.paymentMethod) payType = billing.paymentMethod;
            else if (memo.paymentType) payType = memo.paymentType;
            else if (paid > 0 && (billing.cashAmount || billing.cardAmount)) payType = 'Mixed';
            else if (paid > 0) payType = 'Cash';
            
            if (paid > 0 && payType !== 'Unknown') {
                if (!payTypeTotals[payType]) payTypeTotals[payType] = { amount: 0, count: 0 };
                payTypeTotals[payType].amount += paid;
                payTypeTotals[payType].count++;
            }
            
            // Extract insurances: both from insurances array and legacy fields
            const insurances = memo.insurances || [];
            let primaryInsList = [];   // for display column "Primary Insurance" (non-Aasandha)
            let secondaryInsList = []; // for display column "Secondary Insurance" (Aasandha)
            let insuranceDetailsList = []; // for "Insurance Breakdown" column
            
            // Process each insurance entry
            insurances.forEach(ins => {
                const insName = ins.name || 'Unknown';
                const insAmount = ins.amount || 0;
                insuranceDetailsList.push(`${insName}: MVR ${insAmount.toFixed(2)}`);
                // Update company totals
                if (!insuranceCompanyTotals[insName]) {
                    insuranceCompanyTotals[insName] = { totalAmount: 0, count: 0 };
                }
                insuranceCompanyTotals[insName].totalAmount += insAmount;
                insuranceCompanyTotals[insName].count++;
                
                // Separate primary (non-Aasandha) vs secondary (Aasandha) for dedicated columns
                if (insName.toLowerCase() === 'aasandha') {
                    secondaryInsList.push(`${insName} MVR ${insAmount.toFixed(2)}`);
                } else {
                    primaryInsList.push(`${insName} MVR ${insAmount.toFixed(2)}`);
                }
            });
            
            // Fallback: if no insurances array but legacy fields exist (insurancePayment, aasandhaPayment)
            if (insurances.length === 0) {
                const legacyPrimary = billing.primaryInsurancePayment || billing.insurancePayment || 0;
                const legacyAasandha = billing.aasandhaPayment || 0;
                if (legacyPrimary > 0) {
                    const primaryName = "Primary Insurance";
                    primaryInsList.push(`${primaryName}: MVR ${legacyPrimary.toFixed(2)}`);
                    insuranceDetailsList.push(`${primaryName}: MVR ${legacyPrimary.toFixed(2)}`);
                    if (!insuranceCompanyTotals[primaryName]) insuranceCompanyTotals[primaryName] = { totalAmount: 0, count: 0 };
                    insuranceCompanyTotals[primaryName].totalAmount += legacyPrimary;
                    insuranceCompanyTotals[primaryName].count++;
                }
                if (legacyAasandha > 0) {
                    const aasandhaName = "Aasandha";
                    secondaryInsList.push(`${aasandhaName}: MVR ${legacyAasandha.toFixed(2)}`);
                    insuranceDetailsList.push(`${aasandhaName}: MVR ${legacyAasandha.toFixed(2)}`);
                    if (!insuranceCompanyTotals[aasandhaName]) insuranceCompanyTotals[aasandhaName] = { totalAmount: 0, count: 0 };
                    insuranceCompanyTotals[aasandhaName].totalAmount += legacyAasandha;
                    insuranceCompanyTotals[aasandhaName].count++;
                }
            }
            
            const primaryDisplay = primaryInsList.length ? primaryInsList.join(', ') : 'None';
            const secondaryDisplay = secondaryInsList.length ? secondaryInsList.join(', ') : 'None';
            const insuranceEachDisplay = insuranceDetailsList.length ? insuranceDetailsList.join(' | ') : 'None';
            
            // Services formatting
            const servicesList = memo.services || [];
            let servicesStr = '';
            if (servicesList.length) {
                servicesStr = servicesList.map(s => `${s.name || 'Service'} (${s.qty || 1}) x ${s.price || 0}`).join('; ');
            } else if (memo.treatment) { servicesStr = memo.treatment; } 
            else { servicesStr = '—'; }
            
            // Memo number
            const memoNumber = memo.memoId || memo.id.slice(-6).toUpperCase();
            const visitDate = memo.createdAt ? new Date(memo.createdAt).toLocaleDateString() : 'N/A';
            const doctorName = memo.doctor?.name || 'N/A';
            // User (creator)
            let userName = 'Staff';
            if (memo.createdBy?.name) userName = memo.createdBy.name;
            else if (memo.user?.name) userName = memo.user.name;
            else if (memo.staffName) userName = memo.staffName;
            else if (memo.createdBy) userName = memo.createdBy;
            
            const patientName = memo.patient?.name || 'N/A';
            const payAmount = paid;
            
            tableRows.push({
                memoNo: memoNumber,
                date: visitDate,
                doctor: doctorName,
                user: userName,
                patient: patientName,
                services: servicesStr,
                primaryIns: primaryDisplay,
                secondaryIns: secondaryDisplay,
                insuranceEach: insuranceEachDisplay,
                paidAmount: payAmount,
                payType: payType,
                discount: discountAmt,
                afterDiscount: afterDiscount
            });
        });
        
        // Build insurance company breakdown HTML (sorted by company name)
        const sortedCompanies = Object.keys(insuranceCompanyTotals).sort();
        const insuranceBreakdownHtml = sortedCompanies.map(company => {
            const data = insuranceCompanyTotals[company];
            return `
                <div class="insurance-company-card">
                    <div class="insurance-company-name">${escapeHtml(company)}</div>
                    <div class="insurance-company-total">MVR ${data.totalAmount.toFixed(2)}</div>
                    <div class="insurance-company-count">${data.count} claim(s)</div>
                </div>
            `;
        }).join('');
        
        // Build payment method breakdown HTML
        const sortedPayTypes = Object.keys(payTypeTotals).sort();
        const payTypeBreakdownHtml = sortedPayTypes.map(pt => {
            const data = payTypeTotals[pt];
            return `
                <div class="paytype-card">
                    <div class="paytype-name">${escapeHtml(pt)}</div>
                    <div class="paytype-total">MVR ${data.amount.toFixed(2)}</div>
                    <div class="paytype-count">${data.count} transaction(s)</div>
                </div>
            `;
        }).join('');
        
        const tableHtml = `
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Memo No</th><th>Date</th><th>Doctor</th><th>User</th><th>Patient Name</th>
                            <th>Services</th><th>Primary Insurance</th><th>Secondary Insurance</th>
                            <th>Insurance Breakdown</th><th>Paid (MVR)</th><th>Pay Type</th><th>Discount (MVR)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows.map(r => `
                            <tr>
                                <td><strong>${escapeHtml(r.memoNo)}</strong></td>
                                <td>${r.date}</td>
                                <td>${escapeHtml(r.doctor)}</strong></td>
                                <td>${escapeHtml(r.user)}</strong></td>
                                <td>${escapeHtml(r.patient)}</strong></td>
                                <td style="max-width:220px; white-space:normal;">${escapeHtml(r.services.substring(0, 120))}${r.services.length>120?'…':''}</td>
                                <td><small>${escapeHtml(r.primaryIns)}</small></td>
                                <td><small>${escapeHtml(r.secondaryIns)}</small></td>
                                <td><small>${escapeHtml(r.insuranceEach)}</small></td>
                                <td>MVR ${r.paidAmount.toFixed(2)}</strong></td>
                                <td>${escapeHtml(r.payType)}</strong></td>
                                <td>MVR ${r.discount.toFixed(2)}</strong></td>
                            </tr>
                        `).join('')}
                        ${tableRows.length === 0 ? '<tr><td colspan="12" class="empty-state">No records found for selected period</td>' : ''}
                    </tbody>
                </table>
            </div>
            <div class="stats-footer">
                <div class="stats-footer-title">📊 Financial Summary (${startDate} to ${endDate})</div>
                <div class="stats-grid-small">
                    <div class="stat-card-small"><h4>💰 Total Revenue</h4><div class="stat-value-small">MVR ${totalRevenue.toFixed(2)}</div><div class="stat-label-small">After Discount</div></div>
                    <div class="stat-card-small"><h4>💵 Amount Collected</h4><div class="stat-value-small">MVR ${totalCollected.toFixed(2)}</div><div class="stat-label-small">From patients</div></div>
                    <div class="stat-card-small"><h4>🎟️ Discounts Given</h4><div class="stat-value-small">MVR ${totalDiscount.toFixed(2)}</div><div class="stat-label-small">Total discounts</div></div>
                    <div class="stat-card-small"><h4>📋 Total Visits</h4><div class="stat-value-small">${memos.length}</div><div class="stat-label-small">Memos in period</div></div>
                </div>
            </div>
            <div class="stats-footer">
                <div class="stats-footer-title">🏥 Insurance Breakdown by Company</div>
                <div class="insurance-breakdown-grid">
                    ${insuranceBreakdownHtml || '<div class="empty-state">No insurance claims in this period</div>'}
                </div>
            </div>
            <div class="stats-footer">
                <div class="stats-footer-title">💳 Payment Method Breakdown</div>
                <div class="paytype-breakdown-grid">
                    ${payTypeBreakdownHtml || '<div class="empty-state">No payment transactions recorded</div>'}
                </div>
            </div>
        `;
        document.getElementById('dailyReportContent').innerHTML = tableHtml;
    }

    function printReport() {
        const content = document.getElementById('dailyReportContent').innerHTML;
        const from = document.getElementById('dailyStartDate').value;
        const to = document.getElementById('dailyEndDate').value;
        const dateInfo = `Period: ${from} to ${to}`;
        const win = window.open('', '_blank');
        win.document.write(`
            <!DOCTYPE html><html><head><meta charset="UTF-8"><title>Hope Dental - Daily Report</title>
            <style>
                body{font-family:Inter, Arial; margin:0; padding:1cm; font-size:10pt;} 
                table{border-collapse:collapse; width:100%;} th,td{border:1px solid #aaa; padding:5px;} 
                th{background:#eef2f7;} .stats-footer{margin:15px 0; border:1px solid #ccc; padding:10px;}
                .stats-grid-small,.insurance-breakdown-grid,.paytype-breakdown-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px;}
                .stat-card-small,.insurance-company-card,.paytype-card{border:1px solid #ccc; padding:8px; text-align:center;}
                .report-header{text-align:center; margin-bottom:15px;} .footer{margin-top:20px; text-align:center; font-size:8pt;}
            </style>
            </head><body>
            <div class="report-header"><h2>Hope Dental Clinic</h2><p>Daily / Period Report</p><p>${dateInfo}</p></div>
            ${content}
            <div class="footer">Generated on ${new Date().toLocaleString()}</div>
            <\/body><\/html>
        `);
        win.document.close();
        win.print();
    }

    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function logout() { localStorage.removeItem('loggedInUser'); sessionStorage.clear(); window.location.href = 'login.html'; }
    
    function waitForFirebase() { if(window.db) { loadDailyReport(); } else { setTimeout(waitForFirebase, 500); } }
    waitForFirebase();
</script>
</body>
</html>
