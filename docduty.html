<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hope Dental | Supervisor - Doctor Duty Allocation</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f7;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(90deg, #ffffff 0%, #20b2aa 100%);
            color: #004d4d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo h2 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-info {
            background: rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logout-btn {
            background: #c63d2f;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: #a52a1f;
        }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid #e2eaf0;
        }
        .card h3 {
            color: #0a2f44;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .form-group {
            flex: 1;
            min-width: 160px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #1f5e7e;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #e2eaf0;
            border-radius: 14px;
            font-size: 13px;
            background: white;
        }
        .btn-primary {
            background: #0f5c7a;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #1a6f8f;
        }
        .btn-secondary {
            background: #e2eaf0;
            color: #0a2f44;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-danger {
            background: #c63d2f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 11px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #e2eaf0;
            font-size: 13px;
        }
        th {
            background: #f4f9fe;
            color: #0a2f44;
            font-weight: 600;
        }
        .actions button {
            margin: 0 4px;
        }
        .badge {
            background: #e0f2fe;
            color: #0f5c7a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .empty-row {
            text-align: center;
            padding: 40px;
            color: #8ba0b0;
        }
        .message-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a2f44;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 2000;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @media (max-width: 700px) {
            .form-row {
                flex-direction: column;
            }
            th, td {
                font-size: 11px;
                padding: 8px 4px;
            }
        }
        .timing-preview {
            font-size: 11px;
            color: #2c6e2c;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">
        <h2>🏥 Hope Dental · Duty Allocation</h2>
    </div>
    <div class="user-info">
        <span id="userName">Loading...</span>
        <span id="userRole"></span>
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </div>
</div>

<div class="container">
    <!-- Add / Edit Duty Form with Custom Timings -->
    <div class="card">
        <h3><i class="fas fa-calendar-plus"></i> Assign Doctor Duty (Custom Timing)</h3>
        <div class="form-row">
            <div class="form-group">
                <label>📅 Date</label>
                <input type="date" id="dutyDate" required>
            </div>
            <div class="form-group">
                <label>🕒 Start Time</label>
                <input type="time" id="startTime" required>
            </div>
            <div class="form-group">
                <label>🕓 End Time</label>
                <input type="time" id="endTime" required>
            </div>
            <div class="form-group">
                <label>👨‍⚕️ Doctor</label>
                <select id="doctorSelect">
                    <option value="">-- Select Doctor --</option>
                </select>
            </div>
            <div class="form-group">
                <button class="btn-primary" id="saveDutyBtn"><i class="fas fa-save"></i> Save Allocation</button>
                <button class="btn-secondary" id="cancelEditBtn" style="display:none;">Cancel</button>
            </div>
        </div>
        <div id="timingPreview" class="timing-preview"></div>
        <input type="hidden" id="editId" value="">
    </div>

    <!-- Existing Allocations List -->
    <div class="card">
        <h3><i class="fas fa-list-alt"></i> Current Duty Allocations</h3>
        <div style="overflow-x: auto;">
            <table id="allocationsTable">
                <thead>
                    <tr><th>Date</th><th>Timing (Start - End)</th><th>Doctor</th><th>Speciality</th><th>Actions</th></tr>
                </thead>
                <tbody id="allocationsList">
                    <tr class="empty-row"><td colspan="5">Loading duty allocations...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    (function() {
        // ========== SESSION & SUPERVISOR CHECK ==========
        let currentUser = null;
        const storedUser = localStorage.getItem('loggedInUser');
        if (storedUser) {
            try {
                currentUser = JSON.parse(storedUser);
            } catch(e) {}
        }
        if (!currentUser) {
            const sessionUser = sessionStorage.getItem('clinic_user_session');
            if (sessionUser) {
                try {
                    currentUser = JSON.parse(sessionUser);
                } catch(e) {}
            }
        }
        
        if (!currentUser || currentUser.level !== 'Supervisor') {
            alert("Access denied. Only supervisors can manage duty allocation.");
            window.location.href = 'login.html';
            return;
        }
        
        document.getElementById('userName').textContent = currentUser.name || currentUser.username;
        document.getElementById('userRole').textContent = `(Supervisor)`;
        
        let firestoreDB = null;
        let doctorsList = [];
        let allocationsList = [];
        let editMode = false;
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'message-toast';
            toast.style.background = isError ? '#c63d2f' : '#0a2f44';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Preview custom timing
        function updateTimingPreview() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const preview = document.getElementById('timingPreview');
            if (start && end) {
                preview.innerHTML = `<i class="fas fa-clock"></i> Duty hours: ${start} - ${end}`;
            } else {
                preview.innerHTML = '';
            }
        }
        document.getElementById('startTime').addEventListener('input', updateTimingPreview);
        document.getElementById('endTime').addEventListener('input', updateTimingPreview);
        
        // ========== LOAD DOCTORS FROM USERS COLLECTION ==========
        async function loadDoctors() {
            if (!firestoreDB) return;
            try {
                const snapshot = await firestoreDB.collection("users").where("Level", "==", "Doctor").get();
                doctorsList = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        id: doc.id,
                        name: data.name || doc.id,
                        speciality: data.speciality || "General Physician"
                    };
                });
                populateDoctorSelect();
            } catch (error) {
                console.error("Error loading doctors:", error);
                showToast("Failed to load doctors list", true);
            }
        }
        
        function populateDoctorSelect() {
            const select = document.getElementById('doctorSelect');
            select.innerHTML = '<option value="">-- Select Doctor --</option>';
            doctorsList.forEach(doc => {
                select.innerHTML += `<option value="${doc.id}" data-speciality="${doc.speciality}">${doc.name} (${doc.speciality})</option>`;
            });
        }
        
        // ========== LOAD DUTY ALLOCATIONS (support both old shift and new timings) ==========
        async function loadAllocations() {
            if (!firestoreDB) return;
            try {
                const snapshot = await firestoreDB.collection("dutyAllocations").orderBy("date", "desc").get();
                allocationsList = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return { id: doc.id, ...data };
                });
                renderAllocationsTable();
            } catch (error) {
                console.error("Error loading allocations:", error);
                document.getElementById('allocationsList').innerHTML = '<tr class="empty-row"><td colspan="5">Error loading data</td></tr>';
            }
        }
        
        function renderAllocationsTable() {
            const tbody = document.getElementById('allocationsList');
            if (!allocationsList.length) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No duty allocations found. Add one above.</td></tr>';
                return;
            }
            tbody.innerHTML = allocationsList.map(alloc => {
                const doctor = doctorsList.find(d => d.id === alloc.doctorId) || { name: alloc.doctorName || 'Unknown', speciality: alloc.speciality || '-' };
                // Display timing: either custom start/end or legacy shift
                let timingDisplay = '';
                if (alloc.startTime && alloc.endTime) {
                    timingDisplay = `${alloc.startTime} - ${alloc.endTime}`;
                } else if (alloc.shift) {
                    timingDisplay = alloc.shift;  // backward compatibility
                } else {
                    timingDisplay = 'Not specified';
                }
                return `
                    <tr>
                        <td>${alloc.date || ''}</td>
                        <td><span class="badge">${timingDisplay}</span></td>
                        <td><strong>${doctor.name}</strong></td>
                        <td>${doctor.speciality || '-'}</td>
                        <td class="actions">
                            <button class="btn-secondary edit-btn" data-id="${alloc.id}"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-danger delete-btn" data-id="${alloc.id}"><i class="fas fa-trash"></i> Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.dataset.id;
                    const alloc = allocationsList.find(a => a.id === id);
                    if (alloc) editAllocation(alloc);
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.dataset.id;
                    if (confirm("Delete this duty allocation?")) deleteAllocation(id);
                });
            });
        }
        
        function editAllocation(alloc) {
            document.getElementById('dutyDate').value = alloc.date;
            document.getElementById('startTime').value = alloc.startTime || '';
            document.getElementById('endTime').value = alloc.endTime || '';
            document.getElementById('doctorSelect').value = alloc.doctorId;
            document.getElementById('editId').value = alloc.id;
            editMode = true;
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
            document.getElementById('saveDutyBtn').innerHTML = '<i class="fas fa-pen"></i> Update Allocation';
            updateTimingPreview();
        }
        
        async function saveAllocation() {
            const date = document.getElementById('dutyDate').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const doctorId = document.getElementById('doctorSelect').value;
            const editId = document.getElementById('editId').value;
            
            if (!date || !startTime || !endTime || !doctorId) {
                showToast("Please fill all fields: Date, Start Time, End Time, Doctor", true);
                return;
            }
            
            // Validate that start time is before end time
            if (startTime >= endTime) {
                showToast("Start time must be before end time.", true);
                return;
            }
            
            const selectedDoctor = doctorsList.find(d => d.id === doctorId);
            if (!selectedDoctor) {
                showToast("Selected doctor not found", true);
                return;
            }
            
            const allocationData = {
                date: date,
                startTime: startTime,
                endTime: endTime,
                doctorId: doctorId,
                doctorName: selectedDoctor.name,
                speciality: selectedDoctor.speciality,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedBy: currentUser.username
            };
            
            try {
                if (editId) {
                    await firestoreDB.collection("dutyAllocations").doc(editId).update(allocationData);
                    showToast("Allocation updated successfully");
                } else {
                    // Check for duplicate: same date, same doctor, overlapping timings?
                    // Simple check: same doctor on same date (custom logic can be extended)
                    const existing = allocationsList.find(a => a.date === date && a.doctorId === doctorId);
                    if (existing) {
                        showToast("This doctor already has a duty on this date. Please edit existing or choose different date/doctor.", true);
                        return;
                    }
                    allocationData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await firestoreDB.collection("dutyAllocations").add(allocationData);
                    showToast("Allocation saved successfully");
                }
                resetForm();
                await loadAllocations();
            } catch (error) {
                console.error("Save error:", error);
                showToast("Error saving: " + error.message, true);
            }
        }
        
        async function deleteAllocation(id) {
            try {
                await firestoreDB.collection("dutyAllocations").doc(id).delete();
                showToast("Allocation deleted");
                await loadAllocations();
            } catch (error) {
                console.error("Delete error:", error);
                showToast("Error deleting", true);
            }
        }
        
        function resetForm() {
            document.getElementById('dutyDate').value = '';
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').value = '';
            document.getElementById('doctorSelect').value = '';
            document.getElementById('editId').value = '';
            editMode = false;
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('saveDutyBtn').innerHTML = '<i class="fas fa-save"></i> Save Allocation';
            document.getElementById('timingPreview').innerHTML = '';
        }
        
        // ========== LOGOUT ==========
        async function logout() {
            if (window.rtdb && currentUser) {
                try {
                    await window.rtdb.ref(`online_users/${currentUser.username}`).remove();
                } catch(e) {}
            }
            localStorage.removeItem('loggedInUser');
            sessionStorage.removeItem('clinic_user_session');
            sessionStorage.removeItem('doctorSession');
            localStorage.removeItem('currentDoctor');
            window.location.href = 'login.html';
        }
        
        // ========== INIT ==========
        async function init() {
            if (window.db) firestoreDB = window.db;
            if (!firestoreDB) {
                setTimeout(init, 500);
                return;
            }
            await loadDoctors();
            await loadAllocations();
            
            document.getElementById('saveDutyBtn').addEventListener('click', saveAllocation);
            document.getElementById('cancelEditBtn').addEventListener('click', resetForm);
            document.getElementById('logoutBtn').addEventListener('click', logout);
        }
        
        init();
    })();
</script>
</body>
</html>
