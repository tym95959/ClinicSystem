<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hope Dental | Insurance Claims Report</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase Config (make sure firebase-config.js initializes window.db) -->
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            color: #1a2c3e;
            line-height: 1.4;
        }

        /* Header */
        .clinic-header {
            background: linear-gradient(90deg, #ffffff 0%, #20b2aa 100%);
            color: #004d4d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo h2 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo h2 i {
            font-size: 1.6rem;
            color: #7ab7d4;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .btn-outline {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.3);
        }
        .btn-primary {
            background: #1e6f5c;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #0f5a4a;
        }
        .btn-secondary {
            background: #e67e22;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 28px auto;
            padding: 0 24px;
        }

        /* Filter card */
        .filter-card {
            background: white;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: flex-end;
            border: 1px solid #e9edf2;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 150px;
        }
        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c6e8f;
        }
        .filter-group input, .filter-group select {
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            background: #ffffff;
            transition: 0.2s;
        }
        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #1e6f5c;
            box-shadow: 0 0 0 3px rgba(30,111,92,0.1);
        }
        .btn-generate {
            background: #1e6f5c;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-generate:hover {
            background: #0f5a4a;
            transform: translateY(-1px);
        }

        /* Stats row */
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 18px 20px;
            flex: 1;
            min-width: 180px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-left: 5px solid #1e6f5c;
            transition: 0.2s;
        }
        .stat-card h4 {
            font-size: 12px;
            font-weight: 600;
            color: #5d7182;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .stat-value {
            font-size: 26px;
            font-weight: 700;
            color: #1a2c3e;
        }
        .stat-sub {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 6px;
        }

        /* Table wrapper */
        .table-wrapper {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .data-table th {
            background: #f8fafc;
            padding: 16px 14px;
            text-align: left;
            font-weight: 700;
            color: #1f5e7e;
            font-size: 11px;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #e2e8f0;
        }
        .data-table td {
            padding: 14px 14px;
            border-bottom: 1px solid #f0f4f9;
            color: #1f2e3a;
            vertical-align: top;
        }
        .data-table tr:hover td {
            background-color: #fafcff;
        }
        .badge-primary {
            background: #e1f0fa;
            color: #0f5c7a;
            padding: 4px 8px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 600;
            display: inline-block;
        }
        .badge-secondary {
            background: #e6f4ea;
            color: #1e6f5c;
            padding: 4px 8px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 600;
        }
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #8ba0b0;
            font-size: 14px;
        }

        /* Company breakdown section */
        .company-section {
            background: white;
            border-radius: 24px;
            margin-top: 28px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #edf2f7;
        }
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #1f5e7e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }
        .company-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }
        .company-item {
            background: #f9fcfe;
            border-radius: 16px;
            padding: 12px 14px;
            text-align: center;
            border: 1px solid #e9edf2;
        }
        .company-name {
            font-weight: 700;
            font-size: 13px;
            color: #2c6e8f;
        }
        .company-amount {
            font-size: 16px;
            font-weight: 800;
            color: #1a2c3e;
            margin: 6px 0;
        }
        .company-count {
            font-size: 10px;
            color: #7891a3;
        }

        /* Print styles */
        @media print {
            .clinic-header, .filter-card, .btn-outline, .btn-primary, .btn-generate, .btn-secondary {
                display: none !important;
            }
            .container {
                margin: 0;
                padding: 0;
            }
            .table-wrapper, .stat-card, .company-section {
                border: 1px solid #ccc !important;
                box-shadow: none !important;
            }
            .data-table th, .data-table td {
                border: 1px solid #aaa !important;
            }
            .badge-primary, .badge-secondary {
                border: 1px solid #aaa;
                background: none !important;
                color: black !important;
            }
        }
    </style>
</head>
<body>
<div class="clinic-header">
    <div class="logo">
        <h2><i class="fas fa-file-invoice-dollar"></i> Hope Dental · Insurance Claims</h2>
    </div>
    <div class="header-actions">
        <button class="btn-outline" onclick="window.location.href='reports.html'"><i class="fas fa-arrow-left"></i> Reports</button>
        
    </div>
</div>

<div class="container">
    <!-- Filter Bar -->
    <div class="filter-card">
        <div class="filter-group">
            <label><i class="far fa-calendar-alt"></i> FROM DATE</label>
            <input type="date" id="startDate">
        </div>
        <div class="filter-group">
            <label><i class="far fa-calendar-alt"></i> TO DATE</label>
            <input type="date" id="endDate">
        </div>
        <div class="filter-group">
            <label><i class="fas fa-building"></i> INSURANCE COMPANY</label>
            <select id="insuranceFilterSelect">
                <option value="all">All Insurance Companies</option>
            </select>
        </div>
        <div class="filter-group">
            <button class="btn-generate" onclick="loadInsuranceReport()"><i class="fas fa-chart-line"></i> Generate Report</button>
        </div>
        <div class="filter-group">
            <button class="btn-primary" onclick="printReport()"><i class="fas fa-print"></i> Print</button>
        </div>
        <div class="filter-group">
            <button class="btn-secondary" onclick="exportToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
        </div>
    </div>

    <!-- Report content will be injected here -->
    <div id="dynamicReport">
        <div class="empty-message" style="background: white; border-radius: 24px; padding: 50px;">
            <i class="fas fa-chart-simple" style="font-size: 42px; color: #cbd5e1; margin-bottom: 12px; display: block;"></i>
            Select date range and click "Generate Report"
        </div>
    </div>
</div>

<script>
    // ========== AUTH & GLOBALS ==========
    const loggedInUser = localStorage.getItem('loggedInUser');
    if (!loggedInUser) window.location.href = 'login.html';
    try {
        const user = JSON.parse(loggedInUser);
        const header = document.querySelector('.clinic-header');
        const userSpan = document.createElement('div');
        userSpan.style.cssText = 'background: rgba(255,255,255,0.12); padding: 5px 14px; border-radius: 40px; font-size: 12px; font-weight: 500;';
        userSpan.innerHTML = `<i class="fas fa-user-circle"></i> ${user.name || user.username} (${user.level})`;
        header.insertBefore(userSpan, header.children[1]);
    } catch(e) {}

    // Set default dates (current month)
    const todayDate = new Date();
    const defaultEnd = todayDate.toISOString().split('T')[0];
    const firstDay = new Date(todayDate.getFullYear(), todayDate.getMonth(), 1);
    const defaultStart = firstDay.toISOString().split('T')[0];
    document.getElementById('startDate').value = defaultStart;
    document.getElementById('endDate').value = defaultEnd;

    let currentMemos = [];
    let currentStart = '';
    let currentEnd = '';

    // Load report from Firebase
    async function loadInsuranceReport() {
        const startRaw = document.getElementById('startDate').value;
        const endRaw = document.getElementById('endDate').value;
        if (!startRaw || !endRaw) {
            alert('Please select both start and end dates');
            return;
        }
        if (!window.db) {
            setTimeout(() => loadInsuranceReport(), 400);
            return;
        }

        try {
            const startDateObj = new Date(startRaw);
            startDateObj.setHours(0,0,0,0);
            const endDateObj = new Date(endRaw);
            endDateObj.setHours(23,59,59,999);
            const snapshot = await window.db.collection("memos")
                .where("createdAt", ">=", startDateObj.toISOString())
                .where("createdAt", "<=", endDateObj.toISOString())
                .get();
            const memos = [];
            snapshot.forEach(doc => memos.push({ id: doc.id, ...doc.data() }));
            currentMemos = memos;
            currentStart = startRaw;
            currentEnd = endRaw;
            populateInsuranceDropdown(memos);
            applyFilterAndRender();
        } catch (err) {
            console.error(err);
            document.getElementById('dynamicReport').innerHTML = `<div class="empty-message">❌ Error: ${err.message}</div>`;
        }
    }

    function populateInsuranceDropdown(memos) {
        const companies = new Set();
        memos.forEach(memo => {
            (memo.insurances || []).forEach(ins => { if(ins.name) companies.add(ins.name); });
            const billing = memo.billing || {};
            if (billing.primaryInsurancePayment || billing.insurancePayment) companies.add('Primary Insurance');
            if (billing.aasandhaPayment) companies.add('Aasandha');
        });
        const select = document.getElementById('insuranceFilterSelect');
        const currentVal = select.value;
        select.innerHTML = '<option value="all">🏢 All Insurance Companies</option>';
        Array.from(companies).sort().forEach(c => {
            select.innerHTML += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
        });
        if (currentVal && (currentVal === 'all' || companies.has(currentVal))) select.value = currentVal;
        else select.value = 'all';
    }

    function applyFilterAndRender() {
        const selected = document.getElementById('insuranceFilterSelect').value;
        let filtered = currentMemos;
        if (selected !== 'all') {
            filtered = currentMemos.filter(memo => {
                const insurances = memo.insurances || [];
                let found = insurances.some(ins => ins.name === selected);
                if (!found) {
                    const billing = memo.billing || {};
                    if (selected === 'Primary Insurance' && (billing.primaryInsurancePayment || billing.insurancePayment)) found = true;
                    if (selected === 'Aasandha' && billing.aasandhaPayment) found = true;
                }
                return found;
            });
        }
        renderGroupedReport(filtered, currentStart, currentEnd, selected);
    }

    function renderGroupedReport(memos, startDate, endDate, selectedCompany) {
        if (!memos.length) {
            document.getElementById('dynamicReport').innerHTML = `<div class="empty-message" style="background:white; border-radius:24px; padding:50px;"><i class="fas fa-info-circle"></i> No insurance claims found for this period with the selected filter.</div>`;
            return;
        }

        let totalPrimary = 0, totalSecondary = 0, primaryCount = 0, secondaryCount = 0;
        const companyTotals = {};
        const rows = [];

        memos.forEach(memo => {
            const billing = memo.billing || {};
            const insurances = memo.insurances || [];
            const patient = memo.patient || {};
            const doctorName = memo.doctor?.name || 'N/A';
            const services = memo.services || [];
            const memoNo = memo.memoId || memo.id.slice(-6).toUpperCase();
            const visitDate = memo.createdAt ? new Date(memo.createdAt).toLocaleDateString() : 'N/A';
            const patientName = patient.name || 'N/A';
            const patientIdCard =  patient.nic || patient.passport || 'N/A';

            // If no services, treat as a single service line with no details
            if (!services.length) {
                // Still create a row with empty service details
                const primary = getPrimaryInsurance(insurances, billing);
                const secondary = getSecondaryInsurance(insurances, billing);
                const primaryAmt = primary ? primary.amount : 0;
                const secondaryAmt = secondary ? secondary.amount : 0;
                if (primaryAmt > 0) { totalPrimary += primaryAmt; primaryCount++; }
                if (secondaryAmt > 0) { totalSecondary += secondaryAmt; secondaryCount++; }
                if (primary) updateCompanyTotals(companyTotals, primary.name, primaryAmt);
                if (secondary) updateCompanyTotals(companyTotals, secondary.name, secondaryAmt);
                rows.push({
                    date: visitDate,
                    memoNo,
                    patientName,
                    patientIdCard,
                    doctor: doctorName,
                    serviceName: '—',
                    qty: 1,
                    serviceTotal: billing.afterDiscount || billing.subtotal || 0,
                    primaryName: primary ? primary.name : '—',
                    primaryAmount: primaryAmt,
                    secondaryName: secondary ? secondary.name : '—',
                    secondaryAmount: secondaryAmt
                });
                return;
            }

            // Iterate over services
            services.forEach(s => {
                const serviceName = s.name || 'Service';
                const qty = s.qty || 1;
                const price = s.price || 0;
                const serviceTotal = s.total || (qty * price);
                // Get per-service insurance amounts if available
                let primaryAmt = s.primaryInsuranceAmount || 0;
                let aasandhaAmt = s.aasandhaAmount || 0;
                // Fallback: if service has no insurance amounts but memo has total insurance, we can allocate proportionally
                // For simplicity, we'll use the memo-level primary and secondary if service amounts are zero and there is only one service
                if (primaryAmt === 0 && aasandhaAmt === 0) {
                    // Try to get from memo-level insurance array
                    const primary = getPrimaryInsurance(insurances, billing);
                    const secondary = getSecondaryInsurance(insurances, billing);
                    // If only one service, assign all insurance to it
                    if (services.length === 1) {
                        primaryAmt = primary ? primary.amount : 0;
                        aasandhaAmt = secondary ? secondary.amount : 0;
                    } else {
                        // Proportional allocation based on serviceTotal / totalBill
                        const totalBill = billing.afterDiscount || billing.subtotal || 0;
                        if (totalBill > 0) {
                            const ratio = serviceTotal / totalBill;
                            const primaryTotal = primary ? primary.amount : 0;
                            const secondaryTotal = secondary ? secondary.amount : 0;
                            primaryAmt = primaryTotal * ratio;
                            aasandhaAmt = secondaryTotal * ratio;
                        }
                    }
                }
                // Now get names for insurance
                const primary = getPrimaryInsurance(insurances, billing);
                const secondary = getSecondaryInsurance(insurances, billing);
                const primaryName = primary ? primary.name : '—';
                const secondaryName = secondary ? secondary.name : '—';
                if (primaryAmt > 0) { totalPrimary += primaryAmt; primaryCount++; }
                if (aasandhaAmt > 0) { totalSecondary += aasandhaAmt; secondaryCount++; }
                if (primary) updateCompanyTotals(companyTotals, primary.name, primaryAmt);
                if (secondary) updateCompanyTotals(companyTotals, secondary.name, aasandhaAmt);

                rows.push({
                    date: visitDate,
                    memoNo,
                    patientName,
                    patientIdCard,
                    doctor: doctorName,
                    serviceName: serviceName,
                    qty: qty,
                    serviceTotal: serviceTotal,
                    primaryName: primaryName,
                    primaryAmount: primaryAmt,
                    secondaryName: secondaryName,
                    secondaryAmount: aasandhaAmt
                });
            });
        });

        // Helper to get primary insurance (first non-Aasandha)
        function getPrimaryInsurance(insurances, billing) {
            let primary = null;
            insurances.forEach(ins => {
                if (ins.name && ins.name.toLowerCase() !== 'aasandha') {
                    if (!primary || ins.priority === 'primary') primary = ins;
                }
            });
            if (!primary) {
                const legPrimary = billing.primaryInsurancePayment || billing.insurancePayment || 0;
                if (legPrimary > 0) primary = { name: 'Primary Insurance', amount: legPrimary };
            }
            return primary;
        }

        function getSecondaryInsurance(insurances, billing) {
            let secondary = null;
            insurances.forEach(ins => {
                if (ins.name && ins.name.toLowerCase() === 'aasandha') {
                    secondary = ins;
                }
            });
            if (!secondary) {
                const legAas = billing.aasandhaPayment || 0;
                if (legAas > 0) secondary = { name: 'Aasandha', amount: legAas };
            }
            return secondary;
        }

        function updateCompanyTotals(totals, name, amount) {
            if (!totals[name]) totals[name] = { amount: 0, count: 0 };
            totals[name].amount += amount;
            totals[name].count++;
        }

        // Build company breakdown grid
        const companyHtml = Object.entries(companyTotals)
            .sort((a,b) => a[0].localeCompare(b[0]))
            .map(([name, data]) => `
                <div class="company-item">
                    <div class="company-name">${escapeHtml(name)}</div>
                    <div class="company-amount">MVR ${data.amount.toFixed(2)}</div>
                    <div class="company-count">${data.count} claim(s)</div>
                </div>
            `).join('');

        const filterBadge = selectedCompany !== 'all' ? `<span style="margin-left: 8px; background:#eef2ff; padding:2px 10px; border-radius:20px; font-size:11px;">Filter: ${escapeHtml(selectedCompany)}</span>` : '';
        
        const html = `
            <div class="stats-row">
                <div class="stat-card"><h4>💰 Total Primary Insurance</h4><div class="stat-value">MVR ${totalPrimary.toFixed(2)}</div><div class="stat-sub">${primaryCount} claim(s)</div></div>
                <div class="stat-card"><h4>🟢 Total Secondary Insurance</h4><div class="stat-value">MVR ${totalSecondary.toFixed(2)}</div><div class="stat-sub">${secondaryCount} claim(s)</div></div>
                <div class="stat-card"><h4>📋 Total Service Lines</h4><div class="stat-value">${rows.length}</div><div class="stat-sub">with insurance details</div></div>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr><th>Date</th><th>Memo No</th><th>Patient Name</th><th>ID/Passport</th><th>Doctor</th><th>Service</th><th>Qty</th><th>Service Total</th><th>Primary Insurance</th><th>Primary Amount</th><th>Secondary Insurance</th><th>Secondary Amount</th></tr>
                    </thead>
                    <tbody>
                        ${rows.map(r => `
                            <tr>
                                <td>${r.date}</td>
                                <td><strong>${escapeHtml(r.memoNo)}</strong></td>
                                <td>${escapeHtml(r.patientName)}</td>
                                <td>${escapeHtml(r.patientIdCard)}</td>
                                <td><strong>${escapeHtml(r.doctor)}</strong></td>
                                <td>${escapeHtml(r.serviceName)}</td>
                                <td>${r.qty}</td>
                                <td>MVR ${r.serviceTotal.toFixed(2)}</td>
                                <td><span class="badge-primary">${escapeHtml(r.primaryName)}</span></td>
                                <td>MVR ${r.primaryAmount.toFixed(2)}</td>
                                <td><span class="badge-secondary">${escapeHtml(r.secondaryName)}</span></td>
                                <td>MVR ${r.secondaryAmount.toFixed(2)}</td>
                            </tr>
                        `).join('')}
                        ${rows.length === 0 ? '<tr><td colspan="12" class="empty-message">No matching insurance claims</td></tr>' : ''}
                    </tbody>
                </table>
            </div>
            <div class="company-section">
                <div class="section-title"><i class="fas fa-building"></i> Breakdown by Insurance Company</div>
                <div class="company-grid">${companyHtml || '<div class="empty-message">No data</div>'}</div>
            </div>
        `;
        document.getElementById('dynamicReport').innerHTML = html;
    }

    // CSV Export – now expanded per service
    function exportToCSV() {
        if (!currentMemos.length) { alert('No data to export. Generate report first.'); return; }
        const selected = document.getElementById('insuranceFilterSelect').value;
        let filtered = currentMemos;
        if (selected !== 'all') {
            filtered = currentMemos.filter(memo => {
                let found = (memo.insurances || []).some(ins => ins.name === selected);
                if (!found) {
                    const billing = memo.billing || {};
                    if (selected === 'Primary Insurance' && (billing.primaryInsurancePayment || billing.insurancePayment)) found = true;
                    if (selected === 'Aasandha' && billing.aasandhaPayment) found = true;
                }
                return found;
            });
        }
        const csvRows = [["Date","Memo No","Patient Name","ID/Passport","Doctor","Service","Qty","Service Total (MVR)","Primary Insurance","Primary Amount","Secondary Insurance","Secondary Amount"]];
        filtered.forEach(memo => {
            const billing = memo.billing || {};
            const insurances = memo.insurances || [];
            const patient = memo.patient || {};
            const doctorName = memo.doctor?.name || 'N/A';
            const services = memo.services || [];
            const memoNo = memo.memoId || memo.id.slice(-6).toUpperCase();
            const visitDate = memo.createdAt ? new Date(memo.createdAt).toLocaleDateString() : 'N/A';
            const patientName = patient.name || 'N/A';
            const patientIdCard = patient.id || patient.nic || patient.passport || 'N/A';
            if (!services.length) {
                // Single row with empty service
                const primary = getPrimaryInsurance(insurances, billing);
                const secondary = getSecondaryInsurance(insurances, billing);
                csvRows.push([visitDate, memoNo, patientName, patientIdCard, doctorName, '—', 1, billing.afterDiscount || billing.subtotal || 0, primary ? primary.name : '—', primary ? primary.amount : 0, secondary ? secondary.name : '—', secondary ? secondary.amount : 0]);
                return;
            }
            services.forEach(s => {
                const serviceName = s.name || 'Service';
                const qty = s.qty || 1;
                const serviceTotal = s.total || (qty * s.price || 0);
                let primaryAmt = s.primaryInsuranceAmount || 0;
                let aasandhaAmt = s.aasandhaAmount || 0;
                if (primaryAmt === 0 && aasandhaAmt === 0 && services.length === 1) {
                    const primary = getPrimaryInsurance(insurances, billing);
                    const secondary = getSecondaryInsurance(insurances, billing);
                    primaryAmt = primary ? primary.amount : 0;
                    aasandhaAmt = secondary ? secondary.amount : 0;
                } else if (primaryAmt === 0 && aasandhaAmt === 0 && services.length > 1) {
                    const totalBill = billing.afterDiscount || billing.subtotal || 0;
                    if (totalBill > 0) {
                        const ratio = serviceTotal / totalBill;
                        const primary = getPrimaryInsurance(insurances, billing);
                        const secondary = getSecondaryInsurance(insurances, billing);
                        primaryAmt = (primary ? primary.amount : 0) * ratio;
                        aasandhaAmt = (secondary ? secondary.amount : 0) * ratio;
                    }
                }
                const primary = getPrimaryInsurance(insurances, billing);
                const secondary = getSecondaryInsurance(insurances, billing);
                csvRows.push([visitDate, memoNo, patientName, patientIdCard, doctorName, serviceName, qty, serviceTotal, primary ? primary.name : '—', primaryAmt, secondary ? secondary.name : '—', aasandhaAmt]);
            });
        });
        const csvContent = csvRows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob([csvContent], {type: 'text/csv'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `insurance_claims_${new Date().toISOString().slice(0,10)}.csv`;
        link.click(); URL.revokeObjectURL(link.href);
    }

    function printReport() {
        const originalTitle = document.title;
        document.title = 'Hope Dental Insurance Report';
        window.print();
        document.title = originalTitle;
    }

    function escapeHtml(str) {
        if(!str) return '';
        return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    function logout() { localStorage.removeItem('loggedInUser'); sessionStorage.clear(); window.location.href = 'login.html'; }

    // Listen to filter dropdown change
    document.getElementById('insuranceFilterSelect').addEventListener('change', () => { if(currentMemos.length) applyFilterAndRender(); });
    // Auto load on page ready
    function waitForFirebase() { if(window.db) loadInsuranceReport(); else setTimeout(waitForFirebase, 500); }
    waitForFirebase();
</script>
</body>
