<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hope Dental | Memos List (Filter on Demand) | Print with Insurance Name</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f7;
            min-height: 100vh;
        }
        .clinic-header {
            background: linear-gradient(90deg, #ffffff 0%, #20b2aa 100%);
            color: #004d4d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo h2 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn {
            background: #1e4a6e;
            border: none;
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 11px;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #0f3b55;
        }
        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 20px 24px;
            border: 1px solid #e2eaf0;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0a2f44;
            margin-bottom: 20px;
            border-left: 4px solid #0f5c7a;
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .filter-bar {
            background: #f8fafd;
            border-radius: 20px;
            padding: 15px 18px;
            margin-bottom: 25px;
            border: 1px solid #e0e9f0;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 15px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 140px;
        }
        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            color: #1f4d6e;
            letter-spacing: 0.3px;
        }
        .filter-group input, .filter-group .flatpickr-input {
            padding: 8px 12px;
            border: 1.5px solid #dce5ec;
            border-radius: 30px;
            font-size: 13px;
            background: white;
        }
        .search-group {
            flex: 2;
            min-width: 200px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .primary-filter-btn {
            background: #0f5c7a;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .secondary-btn {
            background: #eef2f7;
            border: 1px solid #cbdde9;
            color: #1f4d6e;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }
        .quick-presets {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .quick-btn {
            background: white;
            border: 1px solid #cbdde9;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
        }
        .quick-btn:hover {
            background: #e0f2fe;
        }
        .memos-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .memos-table th, .memos-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #e9edf2;
            font-size: 13px;
        }
        .memos-table th {
            background: #f4f9fe;
            font-weight: 600;
            color: #1f4d6e;
        }
        .print-btn {
            background: #e0f2fe;
            color: #0f5c7a;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
        }
        .print-btn:hover {
            background: #cbdde9;
        }
        .empty-row {
            text-align: center;
            padding: 40px;
            color: #8ba0b0;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            font-size: 12px;
        }
        .success { background: #e0f7ef; color: #146b3a; }
        .error { background: #ffe9e9; color: #b91c1c; }
        .info { background: #e0f2fe; color: #075985; }
        .stats-badge {
            background: #e0f2fe;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .memos-table { font-size: 11px; }
            .memos-table th, .memos-table td { padding: 8px 4px; }
            .filter-row { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="clinic-header">
    <div class="logo">
        <h2>📄 Hope Dental · Memos (Filter on Demand)</h2>
    </div>
    <div>
        <button class="back-btn" onclick="window.location.href='clinicdash.html'">← Dashboard</button>
        <button class="back-btn" onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="card-title">
            📋 Clinical Memos
            <button class="back-btn" id="refreshDataBtn" style="background:#1e4a6e;">⟳ Reload Data</button>
        </div>
        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-group">
                    <label><i class="far fa-calendar-alt"></i> From Date</label>
                    <input type="text" id="startDate" placeholder="Select start date" autocomplete="off">
                </div>
                <div class="filter-group">
                    <label><i class="far fa-calendar-check"></i> To Date</label>
                    <input type="text" id="endDate" placeholder="Select end date" autocomplete="off">
                </div>
                <div class="filter-group search-group">
                    <label><i class="fas fa-search"></i> Search (Memo ID / Patient Name / Patient ID)</label>
                    <input type="text" id="searchInput" placeholder="e.g., #MEMO123 or John...">
                </div>
                <div class="action-buttons">
                    <button id="applyFilterBtn" class="primary-filter-btn"><i class="fas fa-filter"></i> Apply Filters</button>
                    <button id="clearFiltersBtn" class="secondary-btn"><i class="fas fa-eraser"></i> Clear</button>
                </div>
            </div>
            <div class="quick-presets">
                <span style="font-size:11px; color:#5f7f9a;">Quick date presets:</span>
                <button id="todayBtn" class="quick-btn">Today</button>
                <button id="weekBtn" class="quick-btn">This Week</button>
                <button id="monthBtn" class="quick-btn">This Month</button>
                <button id="allTimeBtn" class="quick-btn">All Time</button>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px;">
            <div class="stats-badge" id="resultStats">No filters applied yet → Press "Apply Filters"</div>
            <div style="font-size: 11px; color: #6c8eae;"><i class="fas fa-info-circle"></i> Memos appear only after clicking Apply</div>
        </div>
        <div style="overflow-x: auto;">
            <table class="memos-table">
                <thead>
                    <tr><th>Memo ID</th><th>Date</th><th>Patient Name</th><th>Patient ID</th><th>Doctor</th><th>Total (MVR)</th><th>Paid</th><th>Balance</th><th>Actions</th></tr>
                </thead>
                <tbody id="memosTbody">
                    <tr class="empty-row"><td colspan="9">💡 Set your filters and click "Apply Filters" to view memos</td></tr>
                </tbody>
            </table>
        </div>
        <div id="messageBox" class="message" style="display: none;"></div>
    </div>
</div>

<script>
    // Auth check
    const loggedInUser = localStorage.getItem('loggedInUser');
    if (!loggedInUser) window.location.href = 'login.html';
    try {
        const user = JSON.parse(loggedInUser);
        const header = document.querySelector('.clinic-header');
        const userSpan = document.createElement('div');
        userSpan.style.cssText = 'background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 20px; font-size: 11px;';
        userSpan.innerHTML = `👤 ${user.name || user.username} (${user.level})`;
        header.insertBefore(userSpan, header.children[1]);
    } catch(e) {}

    // Globals
    let allMemos = [];
    let currentDisplayMemos = [];
    let pendingStartDate = null, pendingEndDate = null, pendingSearchQuery = '';
    let startPicker, endPicker;

    function showMessage(msg, type) {
        const box = document.getElementById('messageBox');
        box.innerText = msg;
        box.className = `message ${type}`;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; box.innerText = ''; }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function parseMemoDate(memo) {
        if (memo.date) { let p = new Date(memo.date); if (!isNaN(p)) return p; }
        if (memo.timestamp) {
            if (typeof memo.timestamp === 'object' && memo.timestamp.toDate) return memo.timestamp.toDate();
            if (typeof memo.timestamp === 'number') return new Date(memo.timestamp);
            if (typeof memo.timestamp === 'string') return new Date(memo.timestamp);
        }
        return null;
    }

    // Helper: Get primary insurance name from memo's insurances array (priority = 1 or first)
    function getPrimaryInsuranceName(memo) {
        const insurances = memo.insurances || [];
        if (insurances.length === 0) return null;
        // Find insurance with priority === 1, otherwise take first
        const primary = insurances.find(ins => ins.priority === 1) || insurances[0];
        return primary.name || null;
    }

    // Helper: Get primary insurance payment amount from billing
    function getPrimaryInsurancePayment(memo) {
        return memo.billing?.primaryInsurancePayment || 0;
    }

    // Core filter logic
    function computeFilteredMemos() {
        if (!allMemos.length) return [];
        let filtered = [...allMemos];
        if (pendingStartDate || pendingEndDate) {
            filtered = filtered.filter(memo => {
                const d = parseMemoDate(memo);
                if (!d) return false;
                const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                if (pendingStartDate && pendingStartDate > day) return false;
                if (pendingEndDate) {
                    const endDay = new Date(pendingEndDate.getFullYear(), pendingEndDate.getMonth(), pendingEndDate.getDate());
                    if (day > endDay) return false;
                }
                return true;
            });
        }
        const query = pendingSearchQuery.trim().toLowerCase();
        if (query) {
            filtered = filtered.filter(memo => {
                const mid = (memo.memoId || '').toLowerCase();
                const pname = (memo.patient?.name || '').toLowerCase();
                const pid = (memo.patient?.id || '').toLowerCase();
                return mid.includes(query) || pname.includes(query) || pid.includes(query);
            });
        }
        return filtered;
    }

    function renderMemosTable() {
        const tbody = document.getElementById('memosTbody');
        const statsSpan = document.getElementById('resultStats');
        if (!currentDisplayMemos.length) {
            if (allMemos.length === 0 && pendingStartDate === null && pendingEndDate === null && !pendingSearchQuery) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="9">📂 No memo data loaded. Click "Reload Data" to fetch.</td></tr>';
                statsSpan.innerHTML = 'No data loaded yet';
            } else if (allMemos.length > 0 && currentDisplayMemos.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="9">🔍 No memos match current filters. Try adjusting.</td></tr>';
                statsSpan.innerHTML = `0 memos match (total ${allMemos.length} in system)`;
            } else {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="9">✨ Apply filters to see results</td></tr>';
                statsSpan.innerHTML = 'Filters ready → click "Apply Filters"';
            }
            return;
        }
        tbody.innerHTML = currentDisplayMemos.map((memo, idx) => {
            const memoId = memo.memoId || memo.id;
            let dateStr = memo.date || (memo.timestamp ? (parseMemoDate(memo) ? parseMemoDate(memo).toLocaleString() : 'N/A') : 'N/A');
            if (parseMemoDate(memo) && !memo.date) dateStr = parseMemoDate(memo).toLocaleString();
            const patientName = memo.patient?.name || 'Unknown';
            const patientId = memo.patient?.id || '-';
            const doctorName = memo.doctor?.name || '-';
            const subtotal = memo.billing?.subtotal || 0;
            const paid = memo.billing?.paid || 0;
            const balance = memo.billing?.balance || 0;
            return `<tr>
                <td><strong>${escapeHtml(memoId)}</strong></td>
                <td>${escapeHtml(dateStr)}</td>
                <td>${escapeHtml(patientName)}</td>
                <td>${escapeHtml(patientId)}</td>
                <td>${escapeHtml(doctorName)}</td>
                <td>MVR ${subtotal.toFixed(2)}</td>
                <td>MVR ${paid.toFixed(2)}</td>
                <td>MVR ${balance.toFixed(2)}</td>
                <td><button class="print-btn" data-memo-idx="${idx}">🖨️ Print</button></td>
            </tr>`;
        }).join('');
        statsSpan.innerHTML = `📋 Showing ${currentDisplayMemos.length} memo${currentDisplayMemos.length !== 1 ? 's' : ''} ${allMemos.length ? `(out of ${allMemos.length} total)` : ''}`;
        document.querySelectorAll('.print-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-memo-idx'));
                if (!isNaN(idx) && currentDisplayMemos[idx]) printMemo(currentDisplayMemos[idx]);
            });
        });
    }

    // UPDATED PRINT FUNCTION: Shows Primary Insurance NAME instead of generic label
    function printMemo(memo) {
        const printWindow = window.open('', '_blank', 'width=800,height=600,scrollbars=yes');
        if (!printWindow) { alert("Please allow pop-ups to print."); return; }

        const memoId = memo.memoId || memo.id;
        const dateStr = memo.date || (memo.timestamp ? (parseMemoDate(memo) ? parseMemoDate(memo).toLocaleString() : 'N/A') : 'N/A');
        const patient = memo.patient || {};
        const doctor = memo.doctor || {};
        const services = memo.services || [];
        const discount = memo.discount || {};
        const billing = memo.billing || {};
        const insurances = memo.insurances || [];
        
        // Get primary insurance details: name + amount
        const primaryInsName = getPrimaryInsuranceName(memo);
        const primaryInsPayment = getPrimaryInsurancePayment(memo);
        const aasandhaPayment = billing.aasandhaPayment || 0;
        
        // Build insurance coverage section (separate from primary label)
        let insuranceHtml = '';
        if (insurances.length > 0) {
            insuranceHtml = `<div class="insurance-box"><strong>Insurance Coverage Details</strong><div class="insurance-list">`;
            insurances.forEach(ins => {
                insuranceHtml += `<span class="insurance-item">${ins.name}: MVR ${(ins.amount || 0).toFixed(2)} (${ins.priority === 1 ? 'Primary' : ins.priority === 2 ? 'Secondary' : 'Other'})</span>`;
            });
            insuranceHtml += `</div></div>`;
        }
        
        // Services table
        let servicesHtml = '';
        if (services.length > 0) {
            servicesHtml = `<table class="services-table"><thead><tr><th>Service</th><th>Qty</th><th>Price</th><th>Total</th><th>Primary Ins</th><th>Aasandha</th><th>Patient Pay</th></tr></thead><tbody>`;
            services.forEach(s => {
                servicesHtml += `<tr>
                    <td>${escapeHtml(s.name)}</td>
                    <td class="center">${s.qty}</td>
                    <td class="right">MVR ${(s.price || 0).toFixed(2)}</td>
                    <td class="right">MVR ${(s.total || 0).toFixed(2)}</td>
                    <td class="right">MVR ${(s.primaryInsuranceAmount || 0).toFixed(2)}</td>
                    <td class="right">MVR ${(s.aasandhaAmount || 0).toFixed(2)}</td>
                    <td class="right">MVR ${(s.patientPay || 0).toFixed(2)}</td>
                </tr>`;
            });
            servicesHtml += `</tbody></table>`;
        } else {
            servicesHtml = '<div class="no-services">No services recorded.</div>';
        }
        
        // Build primary insurance display string with name
        let primaryInsDisplay = '';
        if (primaryInsName) {
            primaryInsDisplay = `<div class="totals-row"><span>🏥 ${escapeHtml(primaryInsName)} (Primary) Paid:</span><span>MVR ${primaryInsPayment.toFixed(2)}</span></div>`;
        } else {
            primaryInsDisplay = `<div class="totals-row"><span>🏥 Primary Insurance Paid:</span><span>MVR ${primaryInsPayment.toFixed(2)}</span></div>`;
        }

        const printContent = `<!DOCTYPE html>
        <html><head><meta charset="UTF-8"><title>Hope Dental - Memo ${memoId}</title>
        <style>
            @page { size: A5; margin: 8mm; }
            body { font-family: 'Inter','Segoe UI',sans-serif; margin:0; padding:0; background:white; color:#1e2a36; font-size:11px; line-height:1.4; }
            .receipt { max-width:100%; margin:0 auto; background:white; }
            .header { text-align:center; border-bottom:2px solid #0a2f44; padding-bottom:6px; margin-bottom:12px; position:relative; }
            .header h1 { color:#0a2f44; margin:0; font-size:20px; }
            .header p { margin:3px 0; font-size:9px; color:#5f7f9a; }
            .memo-title { text-align:center; background:#e0f2fe; padding:4px; border-radius:20px; margin:8px 0; font-weight:bold; font-size:12px; }
            .info-grid { display:flex; justify-content:space-between; background:#f4f9fe; padding:8px 10px; border-radius:12px; margin:10px 0; gap:15px; flex-wrap:wrap; }
            .info-box { flex:1; }
            .info-box strong { font-size:10px; color:#0a2f44; display:block; margin-bottom:4px; border-left:2px solid #0f5c7a; padding-left:6px; }
            .services-table { width:100%; border-collapse:collapse; margin:10px 0; font-size:9px; }
            .services-table th { background:#f4f9fe; padding:5px 4px; text-align:left; border-bottom:1px solid #d0dfe8; }
            .services-table td { padding:4px; border-bottom:1px solid #e9edf2; }
            .right { text-align:right; }
            .center { text-align:center; }
            .insurance-box { background:#fff8e7; padding:6px 10px; border-radius:10px; margin:10px 0; font-size:9px; }
            .insurance-list { display:flex; flex-wrap:wrap; gap:12px; margin-top:4px; }
            .insurance-item { background:white; padding:2px 8px; border-radius:20px; border:1px solid #f0c674; }
            .totals-box { background:linear-gradient(135deg,#f0f9ff,#e8f4fd); border:1px solid #0f5c7a; border-radius:12px; padding:10px; margin:12px 0; }
            .totals-row { display:flex; justify-content:space-between; padding:4px 0; font-size:10px; }
            .totals-row.total { font-weight:800; font-size:13px; border-top:1px dashed #8ba0b0; margin-top:6px; padding-top:6px; }
            .footer { text-align:center; font-size:8px; color:#8ba0b0; border-top:1px solid #ddd; padding-top:8px; margin-top:12px; }
            .no-services { background:#f9f9f9; padding:20px; text-align:center; border-radius:8px; font-style:italic; }
            @media print { body { margin:0; padding:0; } .no-print { display:none; } }
        </style>
        </head><body>
        <div class="receipt">
            <div class="header">
                <img src="hope1.png" alt="Hope Dental Logo" style="position:absolute; left:10px; top:5px; height:80px;">
                <h1>Hope Dental Clinic</h1>
                <p>📍 H. Fairy Palace, Abadhah Ufaa Hingun, Male, Maldives</p>
                <p>☎️ +960 300-1516 &nbsp;|&nbsp; 💬 +960 795-1515</p>
                <p><strong>CLINICAL MEMO / RECEIPT</strong></p>
            </div>
            <div class="memo-title">MEMO NO: ${escapeHtml(memoId)} | DATE: ${escapeHtml(dateStr)}</div>
            <div class="info-grid">
                <div class="info-box">
                    <strong>PATIENT DETAILS</strong>
                    <div>Name: ${escapeHtml(patient.name || '')}</div>
                    <div>ID: ${escapeHtml(patient.id || '')}</div>
                    <div>Contact: ${escapeHtml(patient.phone || '')}</div>
                    <div>Nationality: ${escapeHtml(patient.nationality || '')}</div>
                    <div>${patient.isCitizen ? '✓ Aasandha Eligible' : ''}</div>
                </div>
                <div class="info-box">
                    <strong>DOCTOR DETAILS</strong>
                    <div>Name: ${escapeHtml(doctor.name || '')}</div>
                    <div>Speciality: ${escapeHtml(doctor.speciality || '')}</div>
                </div>
            </div>
            ${servicesHtml}
            ${insuranceHtml}
            <div class="totals-box">
                <div class="totals-row"><span>Subtotal:</span><span>MVR ${(billing.subtotal || 0).toFixed(2)}</span></div>
                <div class="totals-row"><span>Discount (${discount.percent || 0}%):</span><span>MVR ${(discount.amount || 0).toFixed(2)}</span></div>
                <div class="totals-row"><span>After Discount:</span><span>MVR ${(billing.afterDiscount || 0).toFixed(2)}</span></div>
                ${primaryInsDisplay}
                <div class="totals-row"><span>🏛️ Aasandha (Govt.) Paid:</span><span>MVR ${aasandhaPayment.toFixed(2)}</span></div>
                <div class="totals-row total"><span>💰 PATIENT PAYABLE:</span><span>MVR ${(billing.patientPayable || 0).toFixed(2)}</span></div>
                <div class="totals-row"><span>Amount Paid:</span><span>MVR ${(billing.paid || 0).toFixed(2)}</span></div>
                <div class="totals-row"><span>${billing.balance > 0 ? '⚖️ BALANCE DUE' : billing.balance < 0 ? '💰 CHANGE DUE' : '✅ PAID IN FULL'}:</span><span>MVR ${Math.abs(billing.balance || 0).toFixed(2)}</span></div>
            </div>
            <div class="footer">Thank you for choosing Hope Dental.<br>This is a computer-generated receipt. Valid without signature.</div>
            <div class="no-print" style="text-align:center; margin-top:15px;">
                <button onclick="window.print();" style="padding:6px 16px; background:#0a2f44; color:white; border:none; border-radius:30px;">🖨️ Print this Memo</button>
                <button onclick="window.close();" style="padding:6px 16px; background:#c63d2f; color:white; border:none; border-radius:30px;">Close</button>
            </div>
        </div>
        </body></html>`;
        printWindow.document.write(printContent);
        printWindow.document.close();
    }

    function applyFiltersAndShow() {
        const startRaw = document.getElementById('startDate').value;
        const endRaw = document.getElementById('endDate').value;
        const searchRaw = document.getElementById('searchInput').value;
        pendingSearchQuery = searchRaw;
        if (startRaw) { let s = new Date(startRaw); if (!isNaN(s)) pendingStartDate = new Date(s.getFullYear(), s.getMonth(), s.getDate()); else pendingStartDate = null; }
        else pendingStartDate = null;
        if (endRaw) { let e = new Date(endRaw); if (!isNaN(e)) pendingEndDate = new Date(e.getFullYear(), e.getMonth(), e.getDate()); else pendingEndDate = null; }
        else pendingEndDate = null;
        const filtered = computeFilteredMemos();
        currentDisplayMemos = filtered;
        renderMemosTable();
        let msg = [];
        if (pendingStartDate || pendingEndDate) msg.push(`📅 Date range`);
        if (pendingSearchQuery) msg.push(`🔍 "${pendingSearchQuery}"`);
        if (msg.length) showMessage(`Applied ${msg.join(' & ')} → ${currentDisplayMemos.length} results`, "success");
        else showMessage(`No active filters → showing all ${currentDisplayMemos.length} memos`, "info");
    }

    function clearAllFilters() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('searchInput').value = '';
        pendingStartDate = null; pendingEndDate = null; pendingSearchQuery = '';
        currentDisplayMemos = [];
        renderMemosTable();
        showMessage("Filters cleared. Click 'Apply Filters' to view all memos.", "info");
    }

    function setDatePreset(preset) {
        const today = new Date(); today.setHours(0,0,0,0);
        let start = null, end = null;
        if (preset === 'today') { start = new Date(today); end = new Date(today); }
        else if (preset === 'week') { const day = today.getDay(); const diff = (day === 0 ? 6 : day - 1); start = new Date(today); start.setDate(today.getDate() - diff); end = new Date(today); }
        else if (preset === 'month') { start = new Date(today.getFullYear(), today.getMonth(), 1); end = new Date(today.getFullYear(), today.getMonth() + 1, 0); }
        else if (preset === 'all') { start = null; end = null; }
        if (start && startPicker) document.getElementById('startDate').value = start.toISOString().slice(0,10);
        if (end && endPicker) document.getElementById('endDate').value = end.toISOString().slice(0,10);
        if (preset === 'all') { document.getElementById('startDate').value = ''; document.getElementById('endDate').value = ''; }
        showMessage(`Preset "${preset}" applied to date fields. Click "Apply Filters" to see results.`, "info");
    }

    async function loadMemosDataOnly() {
        if (!window.db) { setTimeout(loadMemosDataOnly, 500); return; }
        const tbody = document.getElementById('memosTbody');
        tbody.innerHTML = '<tr class="empty-row"><td colspan="9">🔄 Loading memo data...</td></tr>';
        try {
            const snapshot = await window.db.collection("memos").orderBy("timestamp", "desc").get();
            allMemos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            currentDisplayMemos = [];
            renderMemosTable();
            showMessage(`✅ Loaded ${allMemos.length} memos. Use filters + Apply to view.`, "success");
        } catch (error) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="9">❌ Error loading memos.</td></tr>';
            showMessage("Error: " + error.message, "error");
        }
    }

    function logout() { localStorage.removeItem('loggedInUser'); sessionStorage.removeItem('clinic_user_session'); window.location.href = 'login.html'; }

    function init() {
        startPicker = flatpickr("#startDate", { dateFormat: "Y-m-d", allowInput: true });
        endPicker = flatpickr("#endDate", { dateFormat: "Y-m-d", allowInput: true });
        document.getElementById('applyFilterBtn').addEventListener('click', applyFiltersAndShow);
        document.getElementById('clearFiltersBtn').addEventListener('click', clearAllFilters);
        document.getElementById('refreshDataBtn').addEventListener('click', loadMemosDataOnly);
        document.getElementById('todayBtn').addEventListener('click', () => setDatePreset('today'));
        document.getElementById('weekBtn').addEventListener('click', () => setDatePreset('week'));
        document.getElementById('monthBtn').addEventListener('click', () => setDatePreset('month'));
        document.getElementById('allTimeBtn').addEventListener('click', () => setDatePreset('all'));
        loadMemosDataOnly();
    }

    function waitForFirebase() { if (window.db) init(); else setTimeout(waitForFirebase, 500); }
    waitForFirebase();
</script>
</body>
</html>
