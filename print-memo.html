<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hope Dental | Print Memo (A5 Receipt)</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f7;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            padding: 30px;
            border: 1px solid #e2eaf0;
            text-align: center;
        }
        .loading-spinner {
            display: inline-block;
            width: 60px;
            height: 60px;
            border: 4px solid #e0f2fe;
            border-top-color: #0f5c7a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #1f4d6e;
            font-size: 14px;
            margin-top: 10px;
        }
        .error {
            color: #b91c1c;
            background: #ffe9e9;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
        }
        .close-btn {
            background: #1e4a6e;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            margin-top: 20px;
            transition: 0.2s;
        }
        .close-btn:hover {
            background: #0f3b55;
        }
    </style>
    <script src="firebase-config.js"></script>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="statusContent">
            <div class="loading-spinner"></div>
            <div class="loading-text">
                <i class="fas fa-print"></i> Loading memo and preparing print...<br>
                <small style="color: #8ba0b0;">Please wait</small>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== Auth Check ==========
    const loggedInUser = localStorage.getItem('loggedInUser');
    if (!loggedInUser) {
        window.location.href = 'login.html';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function parseMemoDate(memo) {
        if (memo.date) {
            let p = new Date(memo.date);
            if (!isNaN(p)) return p;
        }
        if (memo.timestamp) {
            if (typeof memo.timestamp === 'object' && memo.timestamp.toDate) return memo.timestamp.toDate();
            if (typeof memo.timestamp === 'number') return new Date(memo.timestamp);
            if (typeof memo.timestamp === 'string') return new Date(memo.timestamp);
        }
        if (memo.createdAt) {
            let p = new Date(memo.createdAt);
            if (!isNaN(p)) return p;
        }
        return new Date();
    }

    function formatDate(dateObj) {
        if (!dateObj) return 'N/A';
        try {
            return dateObj.toLocaleDateString('en-GB', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        } catch(e) {
            return 'N/A';
        }
    }

    function calculateAge(dob) {
        if (!dob) return 'N/A';
        try {
            const birthDate = new Date(dob);
            if (isNaN(birthDate)) return 'N/A';
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        } catch(e) {
            return 'N/A';
        }
    }

    function getActiveInsurances(memo) {
        const insurances = memo.insurances || [];
        const billing = memo.billing || {};
        const results = [];
        
        insurances.forEach(ins => {
            let amount = ins.amount || 0;
            if (amount === 0 && ins.priority === 'primary') {
                amount = billing.primaryInsurancePayment || 0;
            }
            if (amount === 0 && ins.priority === 'secondary') {
                amount = billing.aasandhaPayment || 0;
            }
            if (amount > 0) {
                results.push({
                    name: ins.name || 'Insurance',
                    amount: amount,
                    priority: ins.priority || 'primary'
                });
            }
        });
        
        if (results.length === 0) {
            if (billing.primaryInsurancePayment > 0) {
                results.push({
                    name: 'Primary Insurance',
                    amount: billing.primaryInsurancePayment,
                    priority: 'primary'
                });
            }
            if (billing.aasandhaPayment > 0) {
                results.push({
                    name: 'Aasandha',
                    amount: billing.aasandhaPayment,
                    priority: 'secondary'
                });
            }
        }
        
        return results;
    }

    function getMemoHeading(memo) {
        const services = memo.services || [];
        if (services.length === 0) return 'Service Memo';
        const firstService = services[0];
        const serviceName = firstService.name || '';
        if (serviceName.toLowerCase().includes('consultation')) {
            return 'Consultation Memo';
        }
        return 'Service Memo';
    }

    // ========== REDESIGNED PRINT FUNCTION ==========
    function openPrintWindow(memo) {
        const memoId = memo.memoId || memo.id;
        const dateObj = parseMemoDate(memo);
        const dateStr = formatDate(dateObj);
        const patient = memo.patient || {};
        const doctor = memo.doctor || {};
        const services = memo.services || [];
        const discount = memo.discount || {};
        const billing = memo.billing || {};
        const activeInsurances = getActiveInsurances(memo);
        const insuranceCount = activeInsurances.length;
        const age = calculateAge(patient.dob);
        const memoHeading = getMemoHeading(memo);
        
        // Build insurance display
        let insuranceHtml = '';
        if (insuranceCount > 0) {
            insuranceHtml = activeInsurances.map(ins => {
                return `<div class="insurance-item">
                    <span class="ins-name">${escapeHtml(ins.name)}</span>
                    <span class="ins-amount">MVR ${(ins.amount || 0).toFixed(2)}</span>
                </div>`;
            }).join('');
            insuranceHtml = `<div class="insurance-box">
                <span class="ins-title">🏥 Insurance Coverage</span>
                ${insuranceHtml}
            </div>`;
        }
        
        // Build services table with dynamic columns
        let servicesHtml = '';
        if (services.length > 0) {
            let headerHtml = '';
            let rowHtml = '';
            
            if (insuranceCount === 0) {
                // No insurance - 5 columns: Code, Service, Qty, Price, Total
                headerHtml = `<tr>
                    <th style="text-align:center; width:12%;">Code</th>
                    <th style="text-align:left; width:40%;">Service</th>
                    <th style="text-align:center; width:10%;">Qty</th>
                    <th style="text-align:right; width:19%;">Price</th>
                    <th style="text-align:right; width:19%;">Total</th>
                </tr>`;
                
                services.forEach(s => {
                    rowHtml += `<tr>
                        <td style="text-align:center;"><span class="code-badge">${escapeHtml(s.code || '—')}</span></td>
                        <td style="text-align:left;">${escapeHtml(s.name)}</td>
                        <td style="text-align:center;">${s.qty}</td>
                        <td style="text-align:right;">MVR ${(s.price || 0).toFixed(2)}</td>
                        <td style="text-align:right;">MVR ${(s.total || s.qty * s.price).toFixed(2)}</td>
                    </tr>`;
                });
                
            } else if (insuranceCount === 1) {
                // Single insurance - 6 columns: Code, Service, Qty, Price, Insurance, Total
                const insName = activeInsurances[0].name || 'Insurance';
                headerHtml = `<tr>
                    <th style="text-align:center; width:12%;">Code</th>
                    <th style="text-align:left; width:32%;">Service</th>
                    <th style="text-align:center; width:8%;">Qty</th>
                    <th style="text-align:right; width:16%;">Price</th>
                    <th style="text-align:right; width:16%;">${escapeHtml(insName)}</th>
                    <th style="text-align:right; width:16%;">Total</th>
                </tr>`;
                
                services.forEach(s => {
                    const insAmount = s.primaryInsuranceAmount || s.aasandhaAmount || 0;
                    rowHtml += `<tr>
                        <td style="text-align:center;"><span class="code-badge">${escapeHtml(s.code || '—')}</span></td>
                        <td style="text-align:left;">${escapeHtml(s.name)}</td>
                        <td style="text-align:center;">${s.qty}</td>
                        <td style="text-align:right;">MVR ${(s.price || 0).toFixed(2)}</td>
                        <td style="text-align:right;">MVR ${insAmount.toFixed(2)}</td>
                        <td style="text-align:right;">MVR ${(s.total || s.qty * s.price).toFixed(2)}</td>
                    </tr>`;
                });
                
            } else {
                // Dual insurance - 7 columns: Code, Service, Qty, Price, Insurance1, Insurance2, Total
                const ins1Name = activeInsurances[0]?.name || 'Insurance';
                const ins2Name = activeInsurances[1]?.name || 'Aasandha';
                headerHtml = `<tr>
                    <th style="text-align:center; width:12%;">Code</th>
                    <th style="text-align:left; width:26%;">Service</th>
                    <th style="text-align:center; width:7%;">Qty</th>
                    <th style="text-align:right; width:13%;">Price</th>
                    <th style="text-align:right; width:14%;">${escapeHtml(ins1Name)}</th>
                    <th style="text-align:right; width:14%;">${escapeHtml(ins2Name)}</th>
                    <th style="text-align:right; width:14%;">Total</th>
                </tr>`;
                
                services.forEach(s => {
                    const ins1Amount = s.primaryInsuranceAmount || 0;
                    const ins2Amount = s.aasandhaAmount || 0;
                    rowHtml += `<tr>
                        <td style="text-align:center;"><span class="code-badge">${escapeHtml(s.code || '—')}</span></td>
                        <td style="text-align:left;">${escapeHtml(s.name)}</td>
                        <td style="text-align:center;">${s.qty}</td>
                        <td style="text-align:right;">MVR ${(s.price || 0).toFixed(2)}</td>
                        <td style="text-align:right;">MVR ${ins1Amount.toFixed(2)}</td>
                        <td style="text-align:right;">MVR ${ins2Amount.toFixed(2)}</td>
                        <td style="text-align:right;">MVR ${(s.total || s.qty * s.price).toFixed(2)}</td>
                    </tr>`;
                });
            }
            
            servicesHtml = `<table class="services-table"><thead>${headerHtml}</thead><tbody>${rowHtml}</tbody></table>`;
        } else {
            servicesHtml = '<div class="no-services">No services recorded.</div>';
        }

        const printContent = `<!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>Hope Dental - ${memoHeading} ${memoId}</title>
            <style>
                @page {
                    size: A5;
                    margin: 6mm;
                }
                body {
                    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
                    margin: 0;
                    padding: 0;
                    background: white;
                    color: #1e2a36;
                    font-size: 10px;
                    line-height: 1.4;
                }
                .receipt {
                    max-width: 100%;
                    margin: 0 auto;
                    background: white;
                    padding: 0;
                }
                .header {
                    text-align: center;
                    border-bottom: 2px solid #0a2f44;
                    padding-bottom: 4px;
                    margin-bottom: 8px;
                    position: relative;
                }
                .header h1 {
                    color: #0a2f44;
                    margin: 0;
                    font-size: 16px;
                }
                .header p {
                    margin: 2px 0;
                    font-size: 8px;
                    color: #5f7f9a;
                }
                .logo-container {
                    text-align: center;
                    margin-bottom: 4px;
                }
                .logo-container img {
                    max-height: 60px;
                    width: auto;
                }
                .memo-title {
                    text-align: center;
                    background: #e0f2fe;
                    padding: 3px;
                    border-radius: 20px;
                    margin: 6px 0;
                    font-weight: bold;
                    font-size: 11px;
                }
                .code-badge {
                    background: #e8f0fe;
                    color: #0f5c7a;
                    padding: 1px 6px;
                    border-radius: 8px;
                    font-size: 7px;
                    font-family: monospace;
                    font-weight: 600;
                }
                
                .info-grid {
                    display: flex;
                    gap: 10px;
                    margin: 8px 0;
                }
                .info-left {
                    flex: 1;
                    background: #f8fafd;
                    padding: 6px 10px;
                    border-radius: 8px;
                }
                .info-right {
                    flex: 1;
                    background: #f8fafd;
                    padding: 6px 10px;
                    border-radius: 8px;
                }
                .info-row {
                    display: flex;
                    justify-content: space-between;
                    padding: 2px 0;
                    font-size: 9px;
                    border-bottom: 1px dotted #e9edf2;
                }
                .info-row:last-child {
                    border-bottom: none;
                }
                .info-label {
                    font-weight: 600;
                    color: #0a2f44;
                }
                .info-value {
                    color: #1e2a36;
                }
                
                .insurance-box {
                    background: #fff8e7;
                    padding: 5px 8px;
                    border-radius: 8px;
                    margin: 8px 0;
                    border: 1px solid #f0c674;
                }
                .insurance-box .ins-title {
                    font-weight: 600;
                    font-size: 9px;
                    color: #0a2f44;
                    display: block;
                    margin-bottom: 3px;
                }
                .insurance-item {
                    display: flex;
                    justify-content: space-between;
                    padding: 2px 4px;
                    font-size: 9px;
                    background: white;
                    margin: 2px 0;
                    border-radius: 4px;
                }
                .insurance-item .ins-name {
                    font-weight: 500;
                }
                .insurance-item .ins-amount {
                    font-weight: 600;
                    color: #0f5c7a;
                }
                
                .services-table {
                    width: 100%;
                    border-collapse: collapse;
                    margin: 6px 0;
                    font-size: 8px;
                }
                .services-table th {
                    background: #f4f9fe;
                    padding: 4px 4px;
                    border-bottom: 2px solid #d0dfe8;
                    font-size: 7px;
                    font-weight: 700;
                    color: #0a2f44;
                }
                .services-table td {
                    padding: 4px 4px;
                    border-bottom: 1px solid #e9edf2;
                    font-size: 8px;
                }
                .services-table tr:last-child td {
                    border-bottom: none;
                }
                
                .totals-grid {
                    display: flex;
                    gap: 10px;
                    margin: 8px 0;
                }
                .totals-left {
                    flex: 1;
                    background: #f0f9ff;
                    padding: 6px 10px;
                    border-radius: 8px;
                    border: 1px solid #0f5c7a;
                }
                .totals-right {
                    flex: 1;
                    background: #f0f9ff;
                    padding: 6px 10px;
                    border-radius: 8px;
                    border: 1px solid #0f5c7a;
                }
                .totals-row {
                    display: flex;
                    justify-content: space-between;
                    padding: 2px 0;
                    font-size: 9px;
                    border-bottom: 1px dotted #d0dfe8;
                }
                .totals-row:last-child {
                    border-bottom: none;
                }
                .totals-row.total {
                    font-weight: 800;
                    font-size: 11px;
                    border-top: 2px solid #0f5c7a;
                    margin-top: 3px;
                    padding-top: 3px;
                }
                .totals-row.total .label {
                    color: #0a2f44;
                }
                .totals-row.total .value {
                    color: #0f5c7a;
                }
                
                .footer {
                    text-align: center;
                    font-size: 7px;
                    color: #8ba0b0;
                    border-top: 1px solid #ddd;
                    padding-top: 6px;
                    margin-top: 8px;
                }
                .non-refundable {
                    text-align: center;
                    font-size: 9px;
                    font-weight: 700;
                    color: #b91c1c;
                    margin-top: 4px;
                    padding: 4px;
                    border: 1px dashed #b91c1c;
                    border-radius: 6px;
                    background: #fff5f5;
                    letter-spacing: 0.5px;
                }
                .no-services {
                    background: #f9f9f9;
                    padding: 15px;
                    text-align: center;
                    border-radius: 6px;
                    font-style: italic;
                    font-size: 9px;
                }
                .no-print {
                    display: none;
                }
                @media print {
                    body {
                        margin: 0;
                        padding: 0;
                    }
                    .no-print {
                        display: none;
                    }
                }
            </style>
            <script>
                // Auto-print when page loads
                window.onload = function() {
                    window.print();
                };
            <\/script>
        </head>
        <body>
            <div class="receipt">
                <div class="header">
                    <div class="logo-container">
                        <img src="hope1.png" alt="Hope Dental Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <div style="display:none; font-size:24px; font-weight:bold; color:#0a2f44;">Hope Dental</div>
                    </div>
                    <h1>Hope Dental Clinic</h1>
                    <p>📍 H. Fairy Palace, Abadhah Ufaa Hingun, Male, Maldives</p>
                    <p>☎️ +960 300-1516 &nbsp;|&nbsp; 💬 +960 795-1515</p>
                </div>
                <div class="memo-title">📄 ${escapeHtml(memoHeading)} — #${escapeHtml(memoId)}</div>
                
                <div class="info-grid">
                    <div class="info-left">
                        <div class="info-row"><span class="info-label">Patient Name:</span><span class="info-value">${escapeHtml(patient.name || '')}</span></div>
                        <div class="info-row"><span class="info-label">ID/Passport:</span><span class="info-value">${escapeHtml(patient.id || patient.idNumber || patient.passportNumber || patient.nationalId || '')}</span></div>
                        <div class="info-row"><span class="info-label">Contact:</span><span class="info-value">${escapeHtml(patient.phone || '')}</span></div>
                        <div class="info-row"><span class="info-label">Nationality:</span><span class="info-value">${escapeHtml(patient.nationality || '')}</span></div>
                        <div class="info-row"><span class="info-label">DOB:</span><span class="info-value">${escapeHtml(patient.dob || '')} ${age !== 'N/A' ? `(Age: ${age})` : ''}</span></div>
                    </div>
                    <div class="info-right">
                        <div class="info-row"><span class="info-label">Date:</span><span class="info-value">${escapeHtml(dateStr)}</span></div>
                        <div class="info-row"><span class="info-label">Memo No:</span><span class="info-value">${escapeHtml(memoId)}</span></div>
                        <div class="info-row"><span class="info-label">Doctor:</span><span class="info-value">${escapeHtml(doctor.name || '')} ${doctor.speciality ? `(${escapeHtml(doctor.speciality)})` : ''}</span></div>
                        <div class="info-row"><span class="info-label">Insurance:</span><span class="info-value" style="font-size:8px;">${activeInsurances.map(i => escapeHtml(i.name)).join(' + ')}</span></div>
                    </div>
                </div>
                
                ${servicesHtml}
                
                ${insuranceHtml}
                
                <div class="totals-grid">
                    <div class="totals-left">
                        <div class="totals-row"><span class="label">Subtotal:</span><span>MVR ${(billing.subtotal || 0).toFixed(2)}</span></div>
                        <div class="totals-row"><span class="label">Discount (${discount.percent || 0}%):</span><span>- MVR ${(discount.amount || 0).toFixed(2)}</span></div>
                        <div class="totals-row"><span class="label">After Discount:</span><span>MVR ${(billing.afterDiscount || 0).toFixed(2)}</span></div>
                        <div class="totals-row"><span class="label">Total Patient Payable:</span><span>MVR ${(billing.patientPayable || 0).toFixed(2)}</span></div>
                    </div>
                    <div class="totals-right">
                        <div class="totals-row"><span class="label">Total Insurance Paid:</span><span>MVR ${(billing.totalInsurancePayment || 0).toFixed(2)}</span></div>
                        <div class="totals-row"><span class="label">Amount Paid:</span><span>MVR ${(billing.paid || 0).toFixed(2)}</span></div>
                        <div class="totals-row total">
                            <span class="label">💰 PATIENT PAYABLE:</span>
                            <span class="value">MVR ${(billing.patientPayable || 0).toFixed(2)}</span>
                        </div>
                    </div>
                </div>
                
                <div style="text-align:center; font-size:9px; padding:4px; background:#f4f9fe; border-radius:6px; margin:4px 0;">
                    ${(billing.balance || 0) > 0 ? `⚖️ BALANCE DUE: MVR ${(billing.balance || 0).toFixed(2)}` : 
                      (billing.balance || 0) < 0 ? `💰 CHANGE DUE: MVR ${Math.abs(billing.balance || 0).toFixed(2)}` : 
                      '✅ PAID IN FULL'}
                </div>
                
                <div class="non-refundable">⚠️ THIS MEMO IS NOT REFUNDABLE ⚠️</div>
                
                <div class="footer">Thank you for choosing Hope Dental.<br>This is a computer-generated receipt. Valid without signature.</div>
                
                <div class="no-print" style="text-align:center; margin-top:10px;">
                    <button onclick="window.print();" style="padding:5px 14px; background:#0a2f44; color:white; border:none; border-radius:30px; font-size:10px; cursor:pointer;">🖨️ Print</button>
                    <button onclick="window.close();" style="padding:5px 14px; background:#c63d2f; color:white; border:none; border-radius:30px; font-size:10px; cursor:pointer;">✖ Close</button>
                </div>
            </div>
        </body>
        </html>`;

        const printWindow = window.open('', '_blank', 'width=800,height=600,scrollbars=yes');
        if (printWindow) {
            printWindow.document.write(printContent);
            printWindow.document.close();
            // Close the original window after a short delay
            setTimeout(() => {
                window.close();
            }, 1000);
        } else {
            // If popup blocked, show error
            document.getElementById('statusContent').innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Pop-up blocked! Please allow pop-ups for this site and try again.</p>
                    <button class="close-btn" onclick="window.close()">Close</button>
                </div>
            `;
        }
    }

    // ========== SEARCH MEMO BY ID ==========
    async function searchMemoById(memoId) {
        if (!window.db) return null;
        
        try {
            // Try exact match on memoId field
            const exactMatch = await window.db.collection("memos").where("memoId", "==", memoId).limit(1).get();
            if (!exactMatch.empty) {
                const doc = exactMatch.docs[0];
                return { id: doc.id, ...doc.data() };
            }
            
            // If not found, try searching by document ID
            const docRef = await window.db.collection("memos").doc(memoId).get();
            if (docRef.exists) {
                return { id: docRef.id, ...docRef.data() };
            }
            
            return null;
        } catch (error) {
            console.error("Search by ID error:", error);
            return null;
        }
    }

    // ========== LOAD AND PRINT DIRECTLY ==========
    async function loadAndPrint() {
        const urlParams = new URLSearchParams(window.location.search);
        const memoId = urlParams.get('memoId');
        
        if (!memoId) {
            document.getElementById('statusContent').innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>No memo ID provided in the URL.</p>
                    <p style="margin-top: 10px;">Use: print-memo.html?memoId=1006</p>
                    <button class="close-btn" onclick="window.close()">Close</button>
                </div>
            `;
            return;
        }
        
        if (!window.db) {
            setTimeout(loadAndPrint, 500);
            return;
        }
        
        const memo = await searchMemoById(memoId);
        
        if (memo) {
            // Update status to show success
            document.getElementById('statusContent').innerHTML = `
                <div style="color: #146b3a;">
                    <i class="fas fa-check-circle" style="font-size: 48px; margin-bottom: 15px;"></i>
                    <div class="loading-text">Memo found! Opening print window...</div>
                </div>
            `;
            // Open print window directly
            setTimeout(() => {
                openPrintWindow(memo);
            }, 500);
        } else {
            document.getElementById('statusContent').innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Memo not found with ID: <strong>${escapeHtml(memoId)}</strong></p>
                    <p style="margin-top: 10px;">Please check the memo ID and try again.</p>
                    <button class="close-btn" onclick="window.close()">Close</button>
                </div>
            `;
        }
    }
    
    // ========== INITIALIZATION ==========
    function init() {
        if (window.db) {
            loadAndPrint();
        } else {
            setTimeout(init, 500);
        }
    }
    
    init();
</script>
</body>
</html>
