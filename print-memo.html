<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hope Dental | Print Memo (A5 Receipt)</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f7;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            padding: 24px;
            border: 1px solid #e2eaf0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #0f5c7a;
        }
        .logo h2 {
            font-size: 1.3rem;
            color: #0a2f44;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn {
            background: #1e4a6e;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #0f3b55;
        }
        .print-area {
            background: #f8fafd;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .print-title {
            font-weight: 600;
            color: #1f4d6e;
            margin-bottom: 15px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .memo-preview {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e2eaf0;
            margin-top: 15px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #8ba0b0;
        }
        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #e0f2fe;
            border-top-color: #0f5c7a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            color: #b91c1c;
            background: #ffe9e9;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
        }
        .memo-details {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
        .detail-row {
            display: flex;
            padding: 12px 15px;
            border-bottom: 1px solid #e9edf2;
        }
        .detail-label {
            width: 140px;
            font-weight: 600;
            color: #1f4d6e;
            font-size: 12px;
        }
        .detail-value {
            flex: 1;
            font-size: 12px;
            color: #1e2a36;
        }
        .services-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 11px;
        }
        .services-table th, .services-table td {
            padding: 8px 6px;
            text-align: left;
            border-bottom: 1px solid #e9edf2;
        }
        .services-table th {
            background: #f4f9fe;
            font-weight: 600;
            color: #1f4d6e;
        }
        .services-table .right {
            text-align: right;
        }
        .totals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        .total-card {
            background: #f8fbfe;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2eaf0;
        }
        .total-card .value {
            font-size: 16px;
            font-weight: 700;
            color: #0a2f44;
        }
        .total-card label {
            font-size: 10px;
            color: #6c757d;
        }
        .payable-card {
            background: #e0f2fe;
            border: 2px solid #0f5c7a;
        }
        .payable-card .value {
            color: #0f5c7a;
            font-size: 20px;
        }
        .print-btn-large {
            background: #0f5c7a;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .print-btn-large:hover {
            background: #0a4a63;
            transform: translateY(-1px);
        }
        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-paid {
            background: #e0f7ef;
            color: #146b3a;
        }
        .status-pending {
            background: #ffe9e9;
            color: #b91c1c;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            .detail-row { flex-direction: column; gap: 5px; }
            .detail-label { width: 100%; }
        }
    </style>
    <script src="firebase-config.js"></script>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div class="logo">
                <h2><i class="fas fa-print"></i> Hope Dental · Print Memo</h2>
            </div>
            <div>
                <button class="back-btn" onclick="window.close()"><i class="fas fa-times"></i> Close</button>
            </div>
        </div>

        <div id="mainContent">
            <!-- Content will be loaded here -->
            <div class="loading" id="loadingDiv">
                <div class="loading-spinner"></div>
                <p>Loading memo from link...</p>
                <p style="font-size: 11px; margin-top: 10px;">Memo ID: <span id="displayMemoId">-</span></p>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== Firebase & Auth ==========
    const loggedInUser = localStorage.getItem('loggedInUser');
    if (!loggedInUser) {
        window.location.href = 'login.html';
    }

    let db = null;
    let currentMemo = null;

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function parseMemoDate(memo) {
        if (memo.date) {
            let p = new Date(memo.date);
            if (!isNaN(p)) return p;
        }
        if (memo.timestamp) {
            if (typeof memo.timestamp === 'object' && memo.timestamp.toDate) return memo.timestamp.toDate();
            if (typeof memo.timestamp === 'number') return new Date(memo.timestamp);
            if (typeof memo.timestamp === 'string') return new Date(memo.timestamp);
        }
        if (memo.createdAt) {
            let p = new Date(memo.createdAt);
            if (!isNaN(p)) return p;
        }
        return null;
    }

    function getActiveInsurance(memo) {
        const insurances = memo.insurances || [];
        if (insurances.length === 0) return null;
        const firstInsurance = insurances[0];
        let paymentAmount = memo.billing?.primaryInsurancePayment || 0;
        if (paymentAmount === 0 && firstInsurance.amount) paymentAmount = firstInsurance.amount;
        return {
            name: firstInsurance.name || 'Insurance',
            amount: paymentAmount
        };
    }

    // ========== PRINT FUNCTION ==========
    function printMemoReceipt(memo) {
        if (!memo) {
            alert("No memo data to print.");
            return;
        }

        const printWindow = window.open('', '_blank', 'width=800,height=600,scrollbars=yes');
        if (!printWindow) {
            alert("Please allow pop-ups to print the memo.");
            return;
        }

        const memoId = memo.memoId || memo.id;
        const dateObj = parseMemoDate(memo);
        const dateStr = dateObj ? dateObj.toLocaleString() : (memo.date || 'N/A');
        const patient = memo.patient || {};
        const doctor = memo.doctor || {};
        const services = memo.services || [];
        const discount = memo.discount || {};
        const billing = memo.billing || {};
        const insurances = memo.insurances || [];
        
        const activeInsurance = getActiveInsurance(memo);
        const aasandhaPayment = billing.aasandhaPayment || 0;
        
        let insuranceHtml = '';
        if (insurances.length > 0) {
            insuranceHtml = `<div class="insurance-box"><strong>Insurance Coverage</strong><div class="insurance-list">`;
            insurances.forEach(ins => {
                insuranceHtml += `<span class="insurance-item">${escapeHtml(ins.name)}: MVR ${(ins.amount || 0).toFixed(2)}</span>`;
            });
            insuranceHtml += `</div></div>`;
        }
        
        let servicesHtml = '';
        if (services.length > 0) {
            servicesHtml = `<table class="services-table"><thead><tr><th>Service</th><th>Qty</th><th>Price</th><th>Total</th><th>Insurance</th><th>Aasandha</th><th>Patient Pay</th></tr></thead><tbody>`;
            services.forEach(s => {
                servicesHtml += `<tr>
                    <td>${escapeHtml(s.name)}</td>
                    <td class="center">${s.qty}</td>
                    <td class="right">MVR ${(s.price || 0).toFixed(2)}</td>
                    <td class="right">MVR ${(s.total || s.qty * s.price).toFixed(2)}</td>
                    <td class="right">MVR ${(s.primaryInsuranceAmount || 0).toFixed(2)}</td>
                    <td class="right">MVR ${(s.aasandhaAmount || 0).toFixed(2)}</td>
                    <td class="right">MVR ${(s.patientPay || 0).toFixed(2)}</td>
                </tr>`;
            });
            servicesHtml += `</tbody></table>`;
        } else {
            servicesHtml = '<div class="no-services">No services recorded.</div>';
        }
        
        let insurancePaymentRow = '';
        if (activeInsurance && activeInsurance.amount > 0) {
            insurancePaymentRow = `<div class="totals-row"><span>🏥 ${escapeHtml(activeInsurance.name)} Paid:</span><span>MVR ${activeInsurance.amount.toFixed(2)}</span></div>`;
        }
        
        let aasandhaRow = '';
        if (aasandhaPayment > 0) {
            aasandhaRow = `<div class="totals-row"><span>🏛️ Aasandha (Govt.) Paid:</span><span>MVR ${aasandhaPayment.toFixed(2)}</span></div>`;
        }

        const printContent = `<!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>Hope Dental - Receipt ${memoId}</title>
            <style>
                @page {
                    size: A5;
                    margin: 8mm;
                }
                body {
                    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
                    margin: 0;
                    padding: 0;
                    background: white;
                    color: #1e2a36;
                    font-size: 11px;
                    line-height: 1.4;
                }
                .receipt {
                    max-width: 100%;
                    margin: 0 auto;
                    background: white;
                }
                .header {
                    text-align: center;
                    border-bottom: 2px solid #0a2f44;
                    padding-bottom: 6px;
                    margin-bottom: 12px;
                    position: relative;
                }
                .header h1 {
                    color: #0a2f44;
                    margin: 0;
                    font-size: 20px;
                }
                .header p {
                    margin: 3px 0;
                    font-size: 9px;
                    color: #5f7f9a;
                }
                .memo-title {
                    text-align: center;
                    background: #e0f2fe;
                    padding: 4px;
                    border-radius: 20px;
                    margin: 8px 0;
                    font-weight: bold;
                    font-size: 12px;
                }
                .info-grid {
                    display: flex;
                    justify-content: space-between;
                    background: #f4f9fe;
                    padding: 8px 10px;
                    border-radius: 12px;
                    margin: 10px 0;
                    gap: 15px;
                    flex-wrap: wrap;
                }
                .info-box {
                    flex: 1;
                }
                .info-box strong {
                    font-size: 10px;
                    color: #0a2f44;
                    display: block;
                    margin-bottom: 4px;
                    border-left: 2px solid #0f5c7a;
                    padding-left: 6px;
                }
                .info-box div {
                    font-size: 10px;
                    margin: 3px 0;
                }
                .services-table {
                    width: 100%;
                    border-collapse: collapse;
                    margin: 10px 0;
                    font-size: 9px;
                }
                .services-table th {
                    background: #f4f9fe;
                    padding: 5px 4px;
                    text-align: left;
                    font-weight: 600;
                    border-bottom: 1px solid #d0dfe8;
                }
                .services-table td {
                    padding: 4px;
                    border-bottom: 1px solid #e9edf2;
                }
                .services-table .right {
                    text-align: right;
                }
                .services-table .center {
                    text-align: center;
                }
                .insurance-box {
                    background: #fff8e7;
                    padding: 6px 10px;
                    border-radius: 10px;
                    margin: 10px 0;
                    font-size: 9px;
                }
                .insurance-list {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 12px;
                    margin-top: 4px;
                }
                .insurance-item {
                    background: white;
                    padding: 2px 8px;
                    border-radius: 20px;
                    border: 1px solid #f0c674;
                }
                .totals-box {
                    background: linear-gradient(135deg, #f0f9ff, #e8f4fd);
                    border: 1px solid #0f5c7a;
                    border-radius: 12px;
                    padding: 10px;
                    margin: 12px 0;
                }
                .totals-row {
                    display: flex;
                    justify-content: space-between;
                    padding: 4px 0;
                    font-size: 10px;
                }
                .totals-row.total {
                    font-weight: 800;
                    font-size: 13px;
                    border-top: 1px dashed #8ba0b0;
                    margin-top: 6px;
                    padding-top: 6px;
                }
                .footer {
                    text-align: center;
                    font-size: 8px;
                    color: #8ba0b0;
                    border-top: 1px solid #ddd;
                    padding-top: 8px;
                    margin-top: 12px;
                }
                .no-services {
                    background: #f9f9f9;
                    padding: 20px;
                    text-align: center;
                    border-radius: 8px;
                    font-style: italic;
                }
                .no-print {
                    display: none;
                }
                @media print {
                    body {
                        margin: 0;
                        padding: 0;
                    }
                    .no-print {
                        display: none;
                    }
                }
            </style>
        </head>
        <body>
            <div class="receipt">
                <div class="header">
                    <img src="hope1.png" alt="Hope Dental Logo" style="position:absolute; left:10px; top:5px; height:80px;">
                    <h1>Hope Dental Clinic</h1>
                    <p>📍 H. Fairy Palace, Abadhah Ufaa Hingun, Male, Maldives</p>
                    <p>☎️ +960 300-1516 &nbsp;|&nbsp; 💬 +960 795-1515</p>
                    <p><strong>CLINICAL MEMO / RECEIPT</strong></p>
                </div>
                <div class="memo-title">MEMO NO: ${escapeHtml(memoId)} | DATE: ${escapeHtml(dateStr)}</div>
                <div class="info-grid">
                    <div class="info-box">
                        <strong>PATIENT DETAILS</strong>
                        <div>Name: ${escapeHtml(patient.name || '')}</div>
                        <div>ID: ${escapeHtml(patient.id || patient.idNumber || '')}</div>
                        <div>Contact: ${escapeHtml(patient.phone || '')}</div>
                        <div>Nationality: ${escapeHtml(patient.nationality || '')}</div>
                        <div>${patient.isCitizen ? '✓ Aasandha Eligible' : ''}</div>
                    </div>
                    <div class="info-box">
                        <strong>DOCTOR DETAILS</strong>
                        <div>Name: ${escapeHtml(doctor.name || '')}</div>
                        <div>Speciality: ${escapeHtml(doctor.speciality || '')}</div>
                    </div>
                </div>
                ${servicesHtml}
                ${insuranceHtml}
                <div class="totals-box">
                    <div class="totals-row"><span>Subtotal:</span><span>MVR ${(billing.subtotal || 0).toFixed(2)}</span></div>
                    <div class="totals-row"><span>Discount (${discount.percent || 0}%):</span><span>MVR ${(discount.amount || 0).toFixed(2)}</span></div>
                    <div class="totals-row"><span>After Discount:</span><span>MVR ${(billing.afterDiscount || 0).toFixed(2)}</span></div>
                    ${insurancePaymentRow}
                    ${aasandhaRow}
                    <div class="totals-row total"><span>💰 PATIENT PAYABLE:</span><span>MVR ${(billing.patientPayable || 0).toFixed(2)}</span></div>
                    <div class="totals-row"><span>Amount Paid:</span><span>MVR ${(billing.paid || 0).toFixed(2)}</span></div>
                    <div class="totals-row"><span>${billing.balance > 0 ? '⚖️ BALANCE DUE' : billing.balance < 0 ? '💰 CHANGE DUE' : '✅ PAID IN FULL'}:</span><span>MVR ${Math.abs(billing.balance || 0).toFixed(2)}</span></div>
                </div>
                <div class="footer">
                    Thank you for choosing Hope Dental.<br>
                    This is a computer-generated receipt. Valid without signature.
                </div>
                <div class="no-print" style="text-align:center; margin-top:15px;">
                    <button onclick="window.print();" style="padding:6px 16px; background:#0a2f44; color:white; border:none; border-radius:30px; cursor:pointer;">🖨️ Print this Memo</button>
                    <button onclick="window.close();" style="padding:6px 16px; background:#c63d2f; color:white; border:none; border-radius:30px; margin-left:10px; cursor:pointer;">Close</button>
                </div>
            </div>
        </body>
        </html>`;

        printWindow.document.write(printContent);
        printWindow.document.close();
    }

    // ========== SEARCH MEMO BY ID ==========
    async function searchMemoById(memoId) {
        if (!db) return null;
        
        try {
            // Try exact match on memoId field
            const exactMatch = await db.collection("memos").where("memoId", "==", memoId).limit(1).get();
            if (!exactMatch.empty) {
                const doc = exactMatch.docs[0];
                return { id: doc.id, ...doc.data() };
            }
            
            // If not found, try searching by document ID
            const docRef = await db.collection("memos").doc(memoId).get();
            if (docRef.exists) {
                return { id: docRef.id, ...docRef.data() };
            }
            
            return null;
        } catch (error) {
            console.error("Search by ID error:", error);
            return null;
        }
    }

    // ========== DISPLAY MEMO DETAILS ==========
    function displayMemoDetails(memo) {
        const memoId = memo.memoId || memo.id;
        const dateObj = parseMemoDate(memo);
        const dateStr = dateObj ? dateObj.toLocaleString() : (memo.date || 'N/A');
        const patient = memo.patient || {};
        const doctor = memo.doctor || {};
        const services = memo.services || [];
        const billing = memo.billing || {};
        const balance = billing.balance || 0;
        const statusClass = balance === 0 ? 'status-paid' : 'status-pending';
        const statusText = balance === 0 ? 'Fully Paid' : (balance > 0 ? 'Balance Due' : 'Overpaid');
        
        let servicesHtml = '';
        if (services.length > 0) {
            servicesHtml = `
                <h4 style="margin: 15px 0 10px 0; color: #1f4d6e;">📋 Services</h4>
                <table class="services-table">
                    <thead>
                        <tr><th>Service</th><th>Qty</th><th>Price</th><th>Total</th><th>Insurance</th><th>Aasandha</th><th>Patient Pay</th></tr>
                    </thead>
                    <tbody>
                        ${services.map(s => `
                            <tr>
                                <td>${escapeHtml(s.name)}</td>
                                <td>${s.qty}</td>
                                <td class="right">MVR ${(s.price || 0).toFixed(2)}</td>
                                <td class="right">MVR ${(s.total || s.qty * s.price).toFixed(2)}</td>
                                <td class="right">MVR ${(s.primaryInsuranceAmount || 0).toFixed(2)}</td>
                                <td class="right">MVR ${(s.aasandhaAmount || 0).toFixed(2)}</td>
                                <td class="right">MVR ${(s.patientPay || 0).toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            servicesHtml = '<p style="margin: 15px 0; color: #8ba0b0;">No services recorded.</p>';
        }
        
        const mainContent = document.getElementById('mainContent');
        mainContent.innerHTML = `
            <div class="print-area">
                <div class="print-title">
                    <span><i class="fas fa-file-invoice"></i> Memo Details</span>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </div>
                
                <div class="memo-preview">
                    <div class="memo-details">
                        <div class="detail-row">
                            <div class="detail-label">Memo ID:</div>
                            <div class="detail-value"><strong>${escapeHtml(memoId)}</strong></div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Date:</div>
                            <div class="detail-value">${escapeHtml(dateStr)}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Patient Name:</div>
                            <div class="detail-value">${escapeHtml(patient.name || 'Unknown')}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Patient ID:</div>
                            <div class="detail-value">${escapeHtml(patient.id || patient.idNumber || '-')}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Phone:</div>
                            <div class="detail-value">${escapeHtml(patient.phone || '-')}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Doctor:</div>
                            <div class="detail-value">Dr. ${escapeHtml(doctor.name || '-')} (${escapeHtml(doctor.speciality || '-')})</div>
                        </div>
                        ${servicesHtml}
                        
                        <div class="totals-grid">
                            <div class="total-card"><label>Subtotal</label><div class="value">MVR ${(billing.subtotal || 0).toFixed(2)}</div></div>
                            <div class="total-card"><label>After Discount</label><div class="value">MVR ${(billing.afterDiscount || 0).toFixed(2)}</div></div>
                            <div class="total-card"><label>Primary Insurance</label><div class="value">MVR ${(billing.primaryInsurancePayment || 0).toFixed(2)}</div></div>
                            <div class="total-card"><label>Aasandha</label><div class="value">MVR ${(billing.aasandhaPayment || 0).toFixed(2)}</div></div>
                            <div class="total-card payable-card"><label>Patient Payable</label><div class="value">MVR ${(billing.patientPayable || 0).toFixed(2)}</div></div>
                            <div class="total-card"><label>Paid</label><div class="value">MVR ${(billing.paid || 0).toFixed(2)}</div></div>
                        </div>
                        
                        <div style="margin-top: 15px; text-align: center;">
                            <button id="printReceiptBtn" class="print-btn-large"><i class="fas fa-print"></i> Print Receipt (A5)</button>
                        </div>
                        
                        ${memo.notes ? `<div style="margin-top: 15px; padding: 10px; background: #f8fbfe; border-radius: 8px;"><strong>Notes:</strong><br>${escapeHtml(memo.notes)}</div>` : ''}
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('printReceiptBtn').addEventListener('click', () => {
            printMemoReceipt(memo);
        });
    }

    // ========== LOAD MEMO FROM URL ==========
    async function loadMemoFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const memoId = urlParams.get('memoId');
        
        const displaySpan = document.getElementById('displayMemoId');
        if (displaySpan) displaySpan.textContent = memoId || '?';
        
        if (!memoId) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>No memo ID provided in the URL.</p>
                    <p style="margin-top: 10px;">Use: print-memo.html?memoId=1006</p>
                </div>
            `;
            return;
        }
        
        if (!db) {
            setTimeout(loadMemoFromUrl, 500);
            return;
        }
        
        console.log("Searching for memo:", memoId);
        const memo = await searchMemoById(memoId);
        
        if (memo) {
            currentMemo = memo;
            displayMemoDetails(memo);
        } else {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Memo not found with ID: <strong>${escapeHtml(memoId)}</strong></p>
                    <p style="margin-top: 10px;">Please check the memo ID and try again.</p>
                </div>
            `;
        }
    }
    
    // ========== INITIALIZATION ==========
    function initFirebase() {
        if (window.db) {
            db = window.db;
            loadMemoFromUrl();
        } else {
            setTimeout(initFirebase, 500);
        }
    }
    
    initFirebase();
</script>
</body>
</html>
